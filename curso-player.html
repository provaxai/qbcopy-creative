<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Curso — QbStudy AI</title>
<link rel="stylesheet" href="style.css">
<style>
/* ── COURSE PLAYER LAYOUT ── */
.player-layout {
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* Sidebar */
.player-sidebar {
  width: 300px;
  flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.player-sidebar-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.player-sidebar-header h2 {
  font-size: .92rem;
  font-weight: 700;
  line-height: 1.4;
  margin-bottom: 10px;
}
.player-progress-bar {
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
  margin-bottom: 4px;
}
.player-progress-fill {
  height: 100%;
  background: var(--success);
  border-radius: 3px;
  transition: width .4s ease;
}
.player-progress-label {
  font-size: .73rem;
  color: var(--text-muted);
}
.player-modules {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
}
.module-group { border-bottom: 1px solid var(--border); }
.module-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 20px;
  font-size: .82rem;
  font-weight: 700;
  cursor: pointer;
  user-select: none;
  transition: background .15s;
  color: var(--text);
}
.module-header:hover { background: var(--bg); }
.module-header.open { color: var(--primary); }
.module-arrow {
  margin-left: auto;
  font-size: .65rem;
  transition: transform .2s;
  color: var(--text-muted);
}
.module-header.open .module-arrow { transform: rotate(180deg); }
.module-lessons { display: none; flex-direction: column; }
.module-lessons.open { display: flex; }
.lesson-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 20px 9px 36px;
  font-size: .82rem;
  cursor: pointer;
  transition: background .15s;
  border-left: 3px solid transparent;
}
.lesson-item:hover { background: var(--bg); }
.lesson-item.active {
  background: var(--primary-light);
  border-left-color: var(--primary);
  color: var(--primary);
  font-weight: 600;
}
.lesson-item.done { color: var(--text-muted); }
.lesson-icon {
  width: 20px; height: 20px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-size: .6rem; font-weight: 700;
  border: 1.5px solid var(--border);
  background: var(--surface);
  color: var(--text-muted);
}
.lesson-item.done .lesson-icon { background: var(--success); border-color: var(--success); color: #fff; }
.lesson-item.active .lesson-icon { background: var(--primary); border-color: var(--primary); color: #fff; font-size: .8rem; }

/* Main area */
.player-main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg);
}
.player-topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 28px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.player-topbar-left {
  display: flex;
  align-items: center;
  gap: 12px;
}
.player-topbar-left a {
  font-size: .82rem;
  color: var(--text-muted);
  display: flex; align-items: center; gap: 4px;
}
.player-topbar-left a:hover { color: var(--primary); }
.player-lesson-title {
  font-size: .92rem;
  font-weight: 600;
  color: var(--text);
  max-width: 400px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.player-content {
  flex: 1;
  overflow-y: auto;
  padding: 40px max(28px, 4vw);
}
.lesson-content-card {
  max-width: 760px;
  margin: 0 auto;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 40px 48px;
  box-shadow: var(--shadow-md);
}
.lesson-content-card h1 {
  font-size: 1.5rem;
  font-weight: 800;
  line-height: 1.3;
  margin-bottom: 8px;
  letter-spacing: -.02em;
}
.lesson-breadcrumb {
  font-size: .78rem;
  color: var(--text-muted);
  margin-bottom: 28px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.lesson-body { font-size: .95rem; line-height: 1.85; color: var(--text); }
.lesson-body h3 { font-size: 1rem; font-weight: 700; margin: 24px 0 10px; color: var(--text); }
.lesson-body p { margin-bottom: 14px; }
.lesson-body ul { margin: 0 0 14px 20px; }
.lesson-body ul li { margin-bottom: 6px; }
.lesson-body .highlight {
  background: var(--primary-light);
  border-left: 3px solid var(--primary);
  padding: 12px 16px;
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  margin: 16px 0;
  font-size: .9rem;
}
.lesson-body .law-cite {
  background: #FEF3C7;
  border: 1px solid #FDE68A;
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  font-size: .88rem;
  margin: 12px 0;
  font-style: italic;
  color: #78350F;
}

/* ── VIEW TABS ── */
.player-view-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 28px;
  display: flex;
  align-items: center;
  gap: 2px;
  flex-shrink: 0;
  height: 44px;
}
.view-tab {
  padding: 0 16px;
  height: 44px;
  font-size: .82rem;
  font-weight: 600;
  cursor: pointer;
  border: none;
  background: none;
  border-bottom: 2px solid transparent;
  color: var(--text-muted);
  transition: color .15s, border-color .15s;
  margin-bottom: -1px;
  display: flex; align-items: center; gap: 6px;
}
.view-tab:hover { color: var(--text); }
.view-tab.active { color: var(--primary); border-bottom-color: var(--primary); }
.audio-pill {
  margin-left: auto;
  display: flex; align-items: center; gap: 6px;
  font-size: .78rem;
  color: var(--text-muted);
  cursor: pointer;
  padding: 5px 12px;
  border: 1px solid var(--border);
  border-radius: 20px;
  background: none;
  transition: all .15s;
  font-weight: 600;
}
.audio-pill:hover { border-color: var(--primary); color: var(--primary); }
.audio-pill.playing { border-color: var(--success); color: var(--success); background: #D1FAE5; }

/* ── MIND MAP ── */
.mm-wrap {
  max-width: 800px;
  margin: 0 auto;
  padding: 40px 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
}
.mm-root {
  background: var(--primary);
  color: #fff;
  border-radius: 12px;
  padding: 12px 28px;
  font-weight: 800;
  font-size: 1rem;
  text-align: center;
  box-shadow: 0 4px 14px rgba(37,99,235,.28);
}
.mm-connector-v {
  width: 2px;
  background: var(--border);
}
.mm-connector-h {
  height: 2px;
  background: var(--border);
  align-self: stretch;
}
.mm-branches-row {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  justify-content: center;
  position: relative;
}
.mm-branch-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  min-width: 130px;
}
.mm-branch-label {
  background: var(--primary-light);
  color: var(--primary);
  border: 1.5px solid var(--primary);
  border-radius: 8px;
  padding: 7px 14px;
  font-size: .82rem;
  font-weight: 700;
  text-align: center;
  width: 100%;
}
.mm-leaves { display: flex; flex-direction: column; gap: 5px; width: 100%; }
.mm-leaf {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 5px 10px;
  font-size: .77rem;
  color: var(--text);
  text-align: center;
  transition: border-color .15s, background .15s;
  cursor: default;
}
.mm-leaf:hover { border-color: var(--primary); background: var(--primary-light); }
.mm-note {
  margin-top: 24px;
  font-size: .78rem;
  color: var(--text-muted);
  text-align: center;
}

/* ── SOCRATIC REVIEW ── */
.socratic-wrap {
  max-width: 760px;
  margin: 0 auto;
  padding: 32px 20px 48px;
}
.socratic-intro {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 22px;
  margin-bottom: 20px;
  display: flex;
  gap: 14px;
  align-items: flex-start;
}
.socratic-avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--purple));
  display: flex; align-items: center; justify-content: center;
  font-size: .9rem;
  flex-shrink: 0;
}
.socratic-q-block {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 12px;
  overflow: hidden;
  transition: box-shadow .18s;
}
.socratic-q-block:focus-within,
.socratic-q-block.revealed { box-shadow: 0 0 0 2px var(--primary-light); border-color: var(--primary); }
.socratic-q-header {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 18px 20px 10px;
}
.socratic-q-num {
  width: 26px; height: 26px;
  background: var(--primary-light);
  color: var(--primary);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: .75rem; font-weight: 800;
  flex-shrink: 0;
}
.socratic-q-text {
  font-size: .92rem;
  font-weight: 600;
  line-height: 1.55;
  flex: 1;
  padding-top: 2px;
}
.socratic-actions { display: flex; gap: 8px; padding: 0 20px 16px; flex-wrap: wrap; }
.socratic-hint-box, .socratic-answer-box {
  margin: 0 20px 14px;
  padding: 11px 15px;
  border-radius: var(--radius-sm);
  font-size: .875rem;
  line-height: 1.6;
  display: none;
}
.socratic-hint-box { background: #FEF3C7; border-left: 3px solid #F59E0B; color: #78350F; }
.socratic-answer-box { background: #D1FAE5; border-left: 3px solid var(--success); color: #065F46; font-weight: 500; }
.socratic-hint-box.visible, .socratic-answer-box.visible { display: block; }

/* ── AI HELPER ── */
.ai-helper {
  max-width: 760px;
  margin: 20px auto 0;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 24px;
  display: flex;
  align-items: flex-start;
  gap: 14px;
}
.ai-avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--purple));
  display: flex; align-items: center; justify-content: center;
  font-size: .9rem; flex-shrink: 0;
}
.ai-helper-content h4 { font-size: .85rem; font-weight: 700; margin-bottom: 6px; color: var(--primary); }
.ai-helper-content p { font-size: .85rem; line-height: 1.65; color: var(--text-muted); margin-bottom: 10px; }
.ai-helper-actions { display: flex; gap: 8px; flex-wrap: wrap; }

/* ── QUIZ ── */
.lesson-quiz { max-width: 760px; margin: 20px auto 0; }
.quiz-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
}
.quiz-card h4 { font-size: .9rem; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
.quiz-option {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 11px 14px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  margin-bottom: 8px;
  cursor: pointer;
  font-size: .88rem;
  transition: border-color .15s, background .15s;
}
.quiz-option:hover:not(.locked) { border-color: var(--primary); background: var(--primary-light); }
.quiz-option.correct { border-color: var(--success); background: #D1FAE5; color: #065F46; }
.quiz-option.wrong { border-color: var(--danger); background: #FEE2E2; color: #991B1B; }
.quiz-option.locked { pointer-events: none; }
.quiz-letter {
  width: 24px; height: 24px;
  border-radius: 50%;
  background: var(--bg);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: .73rem; font-weight: 700;
  flex-shrink: 0; margin-top: 1px;
}
.quiz-feedback { margin-top: 12px; font-size: .85rem; display: none; }
.quiz-retry-bar {
  display: flex; align-items: center; gap: 10px;
  margin-top: 10px;
  padding: 10px 14px;
  background: #FEF3C7;
  border-radius: var(--radius-sm);
  font-size: .85rem;
  color: #78350F;
}

/* ── BOTTOM NAV ── */
.player-nav {
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 14px 28px;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.player-nav-center { font-size: .82rem; color: var(--text-muted); }

/* ── RESPONSIVE ── */
#player-sidebar-toggle { display: none; }
@media (max-width: 900px) {
  .player-sidebar { position: fixed; left: -300px; top: 0; bottom: 0; z-index: 200; transition: left .3s; box-shadow: var(--shadow-lg); }
  .player-sidebar.open { left: 0; }
  #player-sidebar-toggle { display: flex; }
  .lesson-content-card { padding: 24px 20px; }
  .player-view-bar { padding: 0 16px; }
  .view-tab { padding: 0 10px; font-size: .78rem; }
  .audio-pill span { display: none; }
  .mm-branches-row { gap: 10px; }
  .mm-branch-col { min-width: 110px; }
}
</style>
</head>
<body>
<div class="player-layout">

  <!-- Sidebar -->
  <aside class="player-sidebar" id="player-sidebar">
    <div class="player-sidebar-header">
      <h2 id="sidebar-course-title"></h2>
      <div class="player-progress-bar">
        <div class="player-progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
      <div class="player-progress-label" id="progress-label">0 de 0 aulas concluídas</div>
    </div>
    <div class="player-modules" id="player-modules"></div>
  </aside>

  <!-- Main -->
  <div class="player-main">
    <div class="player-topbar">
      <div class="player-topbar-left">
        <button id="player-sidebar-toggle" class="btn btn-ghost btn-sm" onclick="togglePlayerSidebar()" aria-label="Menu de aulas">☰</button>
        <a href="cursos-app.html">← Cursos</a>
        <span style="color:var(--border)">|</span>
        <span class="player-lesson-title" id="topbar-lesson-title">Carregando...</span>
      </div>
      <span id="topbar-user" style="font-size:.82rem;color:var(--text-muted);"></span>
    </div>

    <!-- View tabs -->
    <div class="player-view-bar">
      <button class="view-tab active" id="tab-content"  onclick="switchView('content')">📖 Conteúdo</button>
      <button class="view-tab"        id="tab-mindmap"  onclick="switchView('mindmap')">🗺 Mapa Mental</button>
      <button class="view-tab"        id="tab-socratic" onclick="switchView('socratic')">🧠 Revisão Socrática</button>
      <button class="audio-pill" id="audio-btn" onclick="speakSummary()" title="Ouvir resumo em áudio">
        🎧 <span>Ouvir resumo</span>
      </button>
    </div>

    <div class="player-content" id="player-content"></div>

    <div class="player-nav">
      <button class="btn btn-ghost" id="btn-prev" onclick="navigate(-1)">← Aula anterior</button>
      <span class="player-nav-center" id="nav-label"></span>
      <button class="btn btn-primary" id="btn-next" onclick="completeAndNext()">Concluir e avançar →</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script>
Auth.requireAuth();
const user = Auth.getUser();
if (user) {
  const el = document.getElementById('topbar-user');
  if (el) el.textContent = user.name || user.email;
}

// ── Course data ──────────────────────────────────────────────────────────────
const COURSES = {
  prf: {
    title: '🚔 Extensivo PRF Interativo',
    modules: [
      {
        name: 'Módulo 1 — Língua Portuguesa',
        lessons: [
          {
            title: '1.1 Interpretação de Texto',
            summary: 'Interpretação de texto exige extrair o sentido real do autor, não apenas a transcrição literal. A banca CESPE distingue explícito e implícito. Use a estratégia de leitura em dois tempos: primeiro e último parágrafo para identificar o tema, depois leitura orientada pelas questões. Atenção especial aos conectivos que indicam contraste, conclusão e causa.',
            mindmap: {
              root: 'Interpretação de Texto',
              branches: [
                { label: 'Tipos de questão', nodes: ['Ideia principal', 'Inferência', 'Ref. pronominal', 'Sentido contextual'] },
                { label: 'CESPE cobra', nodes: ['Explícito vs Implícito', '"É possível inferir..."', 'Rel. entre parágrafos'] },
                { label: 'Estratégia', nodes: ['1º e último parágrafo', 'Leia as questões antes', 'Leitura orientada'] },
                { label: 'Conectivos', nodes: ['Adversidade: porém/mas', 'Conclusão: logo/assim', 'Causa: pois/porque'] },
              ]
            },
            socratic: [
              {
                q: 'Por que "inferir" é diferente de "transcrever" um trecho do texto? O que muda na sua leitura?',
                hint: 'Pense: inferir requer que você vá além do que está escrito — a conclusão precisa ser sustentada pelo texto, mas não está explícita nele.',
                answer: 'Transcrever é copiar literalmente — já inferir é concluir algo que o texto implica mas não diz diretamente. A banca testa se você leu com profundidade, não se decorou palavras.',
              },
              {
                q: 'Se você vê "porém" ou "todavia" numa frase, o que isso sinaliza sobre a relação entre as ideias antes e depois desse conectivo?',
                hint: 'Esses conectivos pertencem à família da adversidade — eles introduzem uma ideia que contrasta com a anterior.',
                answer: 'Sinalizam contraste ou oposição. A ideia que vem depois do "porém" vai contra ou limita a ideia anterior. É pista valiosa para questões de "o autor defende que…".',
              },
              {
                q: 'Por que a estratégia de ler primeiro e último parágrafo antes do texto completo economiza tempo na prova?',
                hint: 'O primeiro parágrafo geralmente apresenta o tema e a tese; o último parágrafo geralmente conclui ou reforça o argumento central.',
                answer: 'Com tema e conclusão em mente, você lê o restante com foco — sabe o que o autor defende e consegue localizar onde cada questão está respondida, sem releitura total.',
              },
            ],
            content: `
              <h1>Interpretação de Texto</h1>
              <div class="lesson-breadcrumb">Módulo 1 — Língua Portuguesa <span>›</span> Aula 1.1</div>
              <div class="lesson-body">
                <p>A interpretação de texto é uma das habilidades mais exigidas nas provas da PRF e representa uma das maiores fontes de erros dos candidatos.</p>
                <h3>O que é interpretar?</h3>
                <p>Interpretar significa extrair o <strong>sentido real</strong> de um texto — ir além da leitura superficial e compreender o que o autor <em>quis dizer</em>, não apenas o que está escrito literalmente.</p>
                <div class="highlight">
                  <strong>Dica de prova:</strong> A banca CESPE/CEBRASPE cobra a distinção entre o que está <em>explícito</em> no texto (afirmado diretamente) e o que está <em>implícito</em> (pressupostos e inferências). Questões com "é possível inferir que…" pedem interpretação, não transcrição.
                </div>
                <h3>Tipos de questão mais cobrados</h3>
                <ul>
                  <li><strong>Ideia principal:</strong> Qual o tema central? Qual a tese do autor?</li>
                  <li><strong>Inferência:</strong> O que se pode concluir a partir do texto?</li>
                  <li><strong>Referência pronominal:</strong> A que/quem se refere o pronome?</li>
                  <li><strong>Sentido de palavras no contexto:</strong> O que X significa neste texto?</li>
                  <li><strong>Relações entre parágrafos:</strong> Como os parágrafos se relacionam (causa, contraste, exemplificação)?</li>
                </ul>
                <h3>Estratégia de leitura para prova</h3>
                <p>Para provas de concurso, adote a leitura em dois tempos:</p>
                <ul>
                  <li><strong>1ª leitura (30 seg):</strong> Leia apenas o primeiro e último parágrafo. Identifique o tema e a conclusão do autor.</li>
                  <li><strong>2ª leitura (orientada):</strong> Leia as questões antes do texto completo. Volte ao texto com o "filtro" das perguntas.</li>
                </ul>
                <div class="law-cite">"A questão que pede o que o texto diz é diferente da que pede o que você pensa sobre o texto." — Técnica básica de prova CESPE</div>
                <h3>Marcadores textuais importantes</h3>
                <p>Fique atento aos conectivos: <strong>porém, contudo, todavia, entretanto</strong> (adversidade/contraste); <strong>portanto, logo, assim</strong> (conclusão); <strong>pois, porque, já que, uma vez que</strong> (causa).</p>
              </div>
            `,
            quiz: {
              q: 'De acordo com os princípios de interpretação textual, quando uma questão pede "é possível inferir que…", o candidato deve:',
              options: [
                'Copiar literalmente um trecho do texto',
                'Extrair uma conclusão lógica a partir do que está expresso no texto',
                'Expressar sua opinião pessoal sobre o tema',
                'Ignorar o texto e responder com base no conhecimento geral',
              ],
              correct: 1,
              explanation: 'Inferência é extrair uma conclusão que não está explícita no texto, mas que pode ser deduzida logicamente do que foi dito. Não é opinião pessoal nem transcrição literal.',
            }
          },

// ── State ────────────────────────────────────────────────────────────────────
let courseKey   = 'prf';
let flatLessons = [];
let currentFlat = 0;
let completed   = new Set();
let currentView = 'content';
let quizAttempts = {}; // {flatIdx: attempts}
let speechUtterance = null;

function init() {
  const params = new URLSearchParams(location.search);
  courseKey = params.get('curso') || 'prf';
  const course = COURSES[courseKey];
  if (!course) { location.href = 'cursos-app.html'; return; }

  const saved = localStorage.getItem(`qbs_progress_${courseKey}`);
  if (saved) completed = new Set(JSON.parse(saved));

  document.getElementById('sidebar-course-title').textContent = course.title;
  document.title = course.title + ' — QbStudy AI';

  buildFlatList(course);
  buildSidebar(course);
  goToLesson(Number(params.get('aula') || 0));
}

function buildFlatList(course) {
  flatLessons = [];
  course.modules.forEach((mod, mi) => {
    mod.lessons.forEach((les, li) => {
      flatLessons.push({ moduleIdx: mi, lessonIdx: li, title: les.title });
    });
  });
}

function buildSidebar(course) {
  const container = document.getElementById('player-modules');
  container.innerHTML = '';
  course.modules.forEach((mod, mi) => {
    const group = document.createElement('div');
    group.className = 'module-group';

    const header = document.createElement('div');
    header.className = 'module-header open';
    header.innerHTML = `${mod.name} <span class="module-arrow">▾</span>`;
    header.onclick = () => {
      header.classList.toggle('open');
      lessonList.classList.toggle('open');
    };

    const lessonList = document.createElement('div');
    lessonList.className = 'module-lessons open';

    mod.lessons.forEach((les, li) => {
      const flatIdx = flatLessons.findIndex(f => f.moduleIdx === mi && f.lessonIdx === li);
      const item = document.createElement('div');
      item.className = 'lesson-item' + (completed.has(flatIdx) ? ' done' : '');
      item.id = `lesson-item-${flatIdx}`;
      item.innerHTML = `<div class="lesson-icon">${completed.has(flatIdx) ? '✓' : '▶'}</div><span>${les.title}</span>`;
      item.onclick = () => goToLesson(flatIdx);
      lessonList.appendChild(item);
    });

    group.appendChild(header);
    group.appendChild(lessonList);
    container.appendChild(group);
  });
}

function getLesson(idx) {
  const { moduleIdx, lessonIdx } = flatLessons[idx];
  return COURSES[courseKey].modules[moduleIdx].lessons[lessonIdx];
}

function goToLesson(idx) {
  if (idx < 0 || idx >= flatLessons.length) return;
  stopSpeech();
  currentFlat = idx;
  currentView = 'content';

  document.querySelectorAll('.lesson-item').forEach(el => el.classList.remove('active'));
  const activeItem = document.getElementById(`lesson-item-${idx}`);
  if (activeItem) { activeItem.classList.add('active'); activeItem.scrollIntoView({ block: 'nearest' }); }

  renderView('content');
  document.getElementById('topbar-lesson-title').textContent = flatLessons[idx].title;
  document.getElementById('topbar-lesson-title').title = flatLessons[idx].title;
  document.getElementById('btn-prev').disabled = idx === 0;
  const isLast = idx === flatLessons.length - 1;
  document.getElementById('btn-next').textContent = isLast ? '✓ Concluir curso' : 'Concluir e avançar →';
  document.getElementById('nav-label').textContent = `Aula ${idx + 1} de ${flatLessons.length}`;
  updateProgress();

  const url = new URL(location);
  url.searchParams.set('curso', courseKey);
  url.searchParams.set('aula', idx);
  history.replaceState({}, '', url);
}

// ── Views ────────────────────────────────────────────────────────────────────
function switchView(view) {
  stopSpeech();
  currentView = view;
  ['content', 'mindmap', 'socratic'].forEach(v => {
    const tab = document.getElementById(`tab-${v}`);
    if (tab) tab.classList.toggle('active', v === view);
  });
  renderView(view);
}

function renderView(view) {
  const lesson = getLesson(currentFlat);
  const content = document.getElementById('player-content');
  content.scrollTop = 0;

  if (view === 'content') {
    content.innerHTML = `
      <div class="lesson-content-card">${lesson.content}</div>
      ${lesson.quiz ? renderQuiz(lesson.quiz, currentFlat) : ''}
      ${renderAiHelper(lesson)}
    `;
  } else if (view === 'mindmap') {
    content.innerHTML = lesson.mindmap ? renderMindMap(lesson) : `
      <div style="max-width:760px;margin:40px auto;text-align:center;color:var(--text-muted);padding:60px 20px;">
        <div style="font-size:2rem;margin-bottom:12px;">🗺</div>
        <p>Mapa mental não disponível para esta aula.</p>
      </div>`;
  } else if (view === 'socratic') {
    content.innerHTML = lesson.socratic ? renderSocratic(lesson) : `
      <div style="max-width:760px;margin:40px auto;text-align:center;color:var(--text-muted);padding:60px 20px;">
        <div style="font-size:2rem;margin-bottom:12px;">🧠</div>
        <p>Revisão socrática não disponível para esta aula.</p>
      </div>`;
  }
}

// ── Mind Map ─────────────────────────────────────────────────────────────────
function renderMindMap(lesson) {
  const mm = lesson.mindmap;
  const branchesHtml = mm.branches.map(branch => `
    <div class="mm-branch-col">
      <div class="mm-branch-label">${branch.label}</div>
      <div class="mm-leaves">
        ${branch.nodes.map(n => `<div class="mm-leaf">${n}</div>`).join('')}
      </div>
    </div>
  `).join('');

  return `
    <div class="mm-wrap">
      <div class="mm-root">${mm.root}</div>
      <div class="mm-connector-v" style="height:24px;"></div>
      <div class="mm-branches-row">${branchesHtml}</div>
      <p class="mm-note">Passe o cursor sobre os nós para destacá-los · Use junto com a Revisão Socrática para fixar o conteúdo</p>
    </div>
  `;
}

// ── Socratic Review ───────────────────────────────────────────────────────────
function renderSocratic(lesson) {
  const blocks = lesson.socratic.map((item, i) => `
    <div class="socratic-q-block" id="sq-block-${i}">
      <div class="socratic-q-header">
        <div class="socratic-q-num">${i + 1}</div>
        <div class="socratic-q-text">${item.q}</div>
      </div>
      <div class="socratic-hint-box" id="sq-hint-${i}">${item.hint}</div>
      <div class="socratic-answer-box" id="sq-ans-${i}">${item.answer}</div>
      <div class="socratic-actions">
        <button class="btn btn-ghost btn-sm" onclick="toggleSocratic('hint',${i})">💡 Ver dica</button>
        <button class="btn btn-ghost btn-sm" onclick="toggleSocratic('answer',${i})">✅ Ver resposta</button>
      </div>
    </div>
  `).join('');

  return `
    <div class="socratic-wrap">
      <div class="socratic-intro">
        <div class="socratic-avatar">✨</div>
        <div>
          <div style="font-size:.85rem;font-weight:700;color:var(--primary);margin-bottom:4px;">Athena AI — Revisão Socrática</div>
          <div style="font-size:.85rem;color:var(--text-muted);line-height:1.6;">Reflita sobre cada pergunta antes de revelar a dica ou resposta. O esforço de recuperação ativa fortalece a memória muito mais do que reler o conteúdo.</div>
        </div>
      </div>
      ${blocks}
    </div>
  `;
}

function toggleSocratic(type, idx) {
  const el = document.getElementById(`sq-${type === 'hint' ? 'hint' : 'ans'}-${idx}`);
  const block = document.getElementById(`sq-block-${idx}`);
  if (!el) return;
  const isVisible = el.classList.contains('visible');
  el.classList.toggle('visible', !isVisible);
  if (!isVisible) block.classList.add('revealed');
}

// ── Audio TTS ─────────────────────────────────────────────────────────────────
function speakSummary() {
  const lesson = getLesson(currentFlat);
  const btn = document.getElementById('audio-btn');
  if (!lesson.summary) { alert('Resumo em áudio não disponível para esta aula.'); return; }

  if (speechSynthesis.speaking) {
    stopSpeech();
    return;
  }

  const utter = new SpeechSynthesisUtterance(lesson.summary);
  utter.lang = 'pt-BR';
  utter.rate = 0.92;
  utter.pitch = 1;

  // Prefer a PT-BR voice if available
  const voices = speechSynthesis.getVoices();
  const ptVoice = voices.find(v => v.lang.startsWith('pt'));
  if (ptVoice) utter.voice = ptVoice;

  utter.onstart = () => { btn.classList.add('playing'); btn.innerHTML = '⏹ <span>Parar áudio</span>'; };
  utter.onend = utter.onerror = () => { btn.classList.remove('playing'); btn.innerHTML = '🎧 <span>Ouvir resumo</span>'; };

  speechUtterance = utter;
  speechSynthesis.speak(utter);
}

function stopSpeech() {
  if (speechSynthesis.speaking) speechSynthesis.cancel();
  const btn = document.getElementById('audio-btn');
  if (btn) { btn.classList.remove('playing'); btn.innerHTML = '🎧 <span>Ouvir resumo</span>'; }
}

// ── Quiz with retry ───────────────────────────────────────────────────────────
function renderQuiz(quiz, flatIdx) {
  const letters = ['A', 'B', 'C', 'D'];
  const isDone = completed.has(flatIdx);
  return `
    <div class="lesson-quiz">
      <div class="quiz-card" id="quiz-${flatIdx}">
        <h4>📝 Questão de fixação</h4>
        <p style="font-size:.9rem;line-height:1.6;margin-bottom:16px;">${quiz.q}</p>
        <div id="quiz-options-${flatIdx}">
          ${quiz.options.map((opt, i) => `
            <div class="quiz-option${isDone && i === quiz.correct ? ' correct locked' : ''}" data-idx="${i}"
                 onclick="answerQuiz(${flatIdx},${i},${quiz.correct})">
              <div class="quiz-letter">${letters[i]}</div>
              <span>${opt}</span>
            </div>
          `).join('')}
        </div>
        <div class="quiz-feedback" id="quiz-feedback-${flatIdx}"></div>
      </div>
    </div>
  `;
}

function answerQuiz(flatIdx, chosen, correct) {
  const card = document.getElementById(`quiz-${flatIdx}`);
  if (!card) return;
  if (card.querySelector('.correct')) return; // already solved

  if (!quizAttempts[flatIdx]) quizAttempts[flatIdx] = 0;
  const attempts = quizAttempts[flatIdx];

  const options = card.querySelectorAll('.quiz-option');
  const feedback = document.getElementById(`quiz-feedback-${flatIdx}`);
  const lesson = getLesson(flatIdx);
  const explanation = lesson.quiz.explanation;

  if (chosen === correct) {
    options.forEach((opt, i) => {
      opt.classList.add('locked');
      if (i === correct) opt.classList.add('correct');
    });
    feedback.style.display = 'block';
    feedback.innerHTML = `<span style="color:var(--success);font-weight:700;">✓ Correto!</span> ${explanation}`;
    return;
  }

  // Wrong answer
  quizAttempts[flatIdx] = attempts + 1;
  options[chosen].classList.add('wrong');

  if (attempts + 1 >= 2) {
    // Lock after 2nd wrong attempt
    options.forEach((opt, i) => {
      opt.classList.add('locked');
      if (i === correct) opt.classList.add('correct');
    });
    feedback.style.display = 'block';
    feedback.innerHTML = `<span style="color:var(--danger);font-weight:700;">✗ Incorreto.</span> ${explanation}`;
    return;
  }

  // 1st wrong attempt — allow retry
  feedback.style.display = 'block';
  feedback.innerHTML = `
    <div class="quiz-retry-bar">
      <span>✗ Incorreto. Você ainda tem mais uma tentativa.</span>
      <button class="btn btn-sm btn-ghost" onclick="retryQuiz(${flatIdx},${correct})">Tentar novamente</button>
    </div>
  `;
}

function retryQuiz(flatIdx, correct) {
  const card = document.getElementById(`quiz-${flatIdx}`);
  if (!card) return;
  const options = card.querySelectorAll('.quiz-option');
  options.forEach(opt => { opt.classList.remove('wrong', 'correct', 'locked'); });
  const feedback = document.getElementById(`quiz-feedback-${flatIdx}`);
  if (feedback) { feedback.style.display = 'none'; feedback.innerHTML = ''; }
}

        <div style="font-size:1.2rem;font-weight:800;margin-bottom:8px;">Curso concluído!</div>
        <div style="font-size:.9rem;opacity:.9;margin-bottom:20px;">Parabéns! Você completou todas as aulas deste curso.</div>
        <a href="cursos-app.html" class="btn" style="background:#fff;color:var(--success);font-weight:700;">← Voltar aos cursos</a>
      </div>
    `;
  }
}

function navigate(dir) { goToLesson(currentFlat + dir); }

function updateProgress() {
  const total = flatLessons.length;
  const done = completed.size;
  const pct = total ? Math.round((done / total) * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = `${done} de ${total} aulas concluídas`;
}

function togglePlayerSidebar() {
  document.getElementById('player-sidebar').classList.toggle('open');
}

init();
</script>
</body>
</html>
