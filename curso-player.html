<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Curso — Prova X</title>
<link rel="stylesheet" href="style.css">
<style>
/* ═══════════════════════════════════════════════
   PLAYER PREMIUM — dark sidebar + light content
═══════════════════════════════════════════════ */

/* Palette extension */
:root {
  --sb: #0F172A;
  --sb-surf: #1E293B;
  --sb-border: rgba(255,255,255,.07);
  --sb-text: #E2E8F0;
  --sb-muted: #94A3B8;
  --sb-accent: #FF8C5A;
  --sb-accent-bg: rgba(255,140,90,.12);
  --tb-h: 58px;
  --tab-h: 42px;
  --bnav-h: 58px;
  --lesson-fs: 16px;
}

body { overflow: hidden; }

/* ── LAYOUT ── */
.px-layout {
  display: flex;
  height: 100vh;
  overflow: hidden;
  background: var(--sb);
}

/* ═══ SIDEBAR ═══ */
.px-sidebar {
  width: 288px;
  flex-shrink: 0;
  background: var(--sb);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: width .25s cubic-bezier(.4,0,.2,1);
  border-right: 1px solid var(--sb-border);
}
.px-sidebar.collapsed { width: 0; }

/* Sidebar header */
.px-sb-header {
  padding: 16px 18px 14px;
  border-bottom: 1px solid var(--sb-border);
  flex-shrink: 0;
}
.px-sb-back {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: .75rem;
  font-weight: 600;
  color: var(--sb-muted);
  text-decoration: none;
  letter-spacing: .03em;
  margin-bottom: 14px;
  transition: color .15s;
}
.px-sb-back:hover { color: var(--sb-text); }

.px-sb-course-title {
  font-size: .92rem;
  font-weight: 800;
  color: var(--sb-text);
  line-height: 1.35;
  margin-bottom: 5px;
}
.px-sb-topic-count {
  font-size: .72rem;
  color: var(--sb-muted);
  margin-bottom: 12px;
}

/* Progress */
.px-sb-prog {
  margin-bottom: 12px;
}
.px-sb-prog-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: .72rem;
  color: var(--sb-muted);
  margin-bottom: 5px;
  font-weight: 600;
}
.px-sb-prog-row span:last-child { color: #FF8C5A; }
.px-sb-prog-track {
  height: 5px;
  background: rgba(255,255,255,.1);
  border-radius: 3px;
  overflow: hidden;
}
.px-sb-prog-fill {
  height: 100%;
  background: linear-gradient(90deg, #FF8C5A, #A78BFA);
  border-radius: 3px;
  transition: width .5s ease;
}

/* Upgrade notice */
.px-sb-notice {
  background: rgba(251,191,36,.1);
  border: 1px solid rgba(251,191,36,.25);
  border-radius: 7px;
  padding: 8px 12px;
  font-size: .72rem;
  color: #FCD34D;
  font-weight: 600;
  margin-bottom: 12px;
  line-height: 1.4;
}

/* CTA buttons */
.px-sb-cta-group { display: flex; flex-direction: column; gap: 7px; }
.px-sb-cta {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 9px 14px;
  border-radius: 8px;
  font-size: .79rem;
  font-weight: 600;
  cursor: pointer;
  border: none;
  text-decoration: none;
  transition: opacity .15s, transform .12s;
}
.px-sb-cta:hover { opacity: .88; transform: translateY(-1px); }
.px-sb-cta-ghost {
  background: rgba(255,255,255,.07);
  color: var(--sb-text);
}
.px-sb-cta-accent {
  background: linear-gradient(135deg, #F5520C, #FF7040);
  color: #fff;
  box-shadow: 0 3px 12px rgba(245,82,12,.35);
}

/* Index label */
.px-sb-index-label {
  padding: 12px 18px 8px;
  font-size: .65rem;
  font-weight: 700;
  letter-spacing: .08em;
  color: var(--sb-muted);
  flex-shrink: 0;
}

/* Module list */
.px-sb-modules {
  flex: 1;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,.1) transparent;
}
.px-sb-modules::-webkit-scrollbar { width: 4px; }
.px-sb-modules::-webkit-scrollbar-track { background: transparent; }
.px-sb-modules::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 4px; }

/* Module group */
.px-sb-mod-group { border-bottom: 1px solid var(--sb-border); }

.px-sb-mod-header {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 10px 18px;
  cursor: pointer;
  user-select: none;
  transition: background .12s;
}
.px-sb-mod-header:hover { background: rgba(255,255,255,.04); }

.px-sb-mod-badge {
  width: 22px; height: 22px;
  border-radius: 50%;
  background: rgba(255,255,255,.1);
  color: var(--sb-muted);
  font-size: .68rem;
  font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.px-sb-mod-group.all-done .px-sb-mod-badge {
  background: rgba(16,185,129,.2);
  color: #34D399;
}
.px-sb-mod-name {
  flex: 1;
  font-size: .79rem;
  font-weight: 600;
  color: var(--sb-text);
  line-height: 1.3;
}
.px-sb-mod-meta {
  font-size: .68rem;
  color: var(--sb-muted);
  white-space: nowrap;
}
.px-sb-mod-arrow {
  font-size: .6rem;
  color: var(--sb-muted);
  transition: transform .2s;
  flex-shrink: 0;
}
.px-sb-mod-header.open .px-sb-mod-arrow { transform: rotate(180deg); }

/* Lesson list */
.px-sb-lessons { display: none; }
.px-sb-lessons.open { display: block; }

.px-sb-lesson {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 18px 8px 28px;
  cursor: pointer;
  transition: background .12s;
  border-left: 2px solid transparent;
  position: relative;
}
.px-sb-lesson:hover:not(.locked) { background: rgba(255,255,255,.04); }
.px-sb-lesson.active {
  background: var(--sb-accent-bg);
  border-left-color: var(--sb-accent);
}
.px-sb-lesson.locked { cursor: default; opacity: .55; }

.px-sb-les-check {
  width: 16px; height: 16px;
  border-radius: 3px;
  border: 1.5px solid rgba(255,255,255,.2);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-size: .55rem;
  color: transparent;
  transition: all .15s;
}
.px-sb-les-check.checked {
  background: #34D399;
  border-color: #34D399;
  color: #fff;
}
.px-sb-lesson.active .px-sb-les-check {
  border-color: var(--sb-accent);
}

.px-sb-les-num {
  font-size: .68rem;
  font-weight: 700;
  color: var(--sb-muted);
  width: 22px;
  flex-shrink: 0;
  text-align: center;
}
.px-sb-lesson.active .px-sb-les-num { color: var(--sb-accent); }

.px-sb-les-name {
  flex: 1;
  font-size: .78rem;
  color: #CBD5E1;
  line-height: 1.35;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.px-sb-lesson.active .px-sb-les-name { color: var(--sb-text); font-weight: 600; }
.px-sb-lesson.done .px-sb-les-name { color: var(--sb-muted); }

.px-sb-lock { font-size: .72rem; flex-shrink: 0; }

/* ═══ MAIN ═══ */
.px-main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
  background: #F8FAFC;
}

/* ── TOP BAR (dark) ── */
.px-topbar {
  background: var(--sb);
  height: var(--tb-h);
  display: flex;
  align-items: center;
  padding: 0 16px 0 8px;
  gap: 10px;
  flex-shrink: 0;
  border-bottom: 1px solid var(--sb-border);
}

.px-tb-toggle {
  width: 34px; height: 34px;
  border-radius: 7px;
  border: none;
  background: rgba(255,255,255,.07);
  color: var(--sb-muted);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: .8rem;
  flex-shrink: 0;
  transition: background .15s, color .15s;
}
.px-tb-toggle:hover { background: rgba(255,255,255,.12); color: var(--sb-text); }
.px-sidebar.collapsed ~ .px-main .px-tb-toggle { transform: rotate(180deg); }

.px-tb-info {
  display: flex;
  align-items: baseline;
  gap: 10px;
  flex: 1;
  min-width: 0;
}
.px-tb-lesson-name {
  font-size: .85rem;
  font-weight: 700;
  color: var(--sb-text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 280px;
}
.px-tb-duration {
  font-size: .7rem;
  color: var(--sb-muted);
  background: rgba(255,255,255,.07);
  padding: 2px 8px;
  border-radius: 20px;
  white-space: nowrap;
  flex-shrink: 0;
}

/* Topbar nav */
.px-tb-nav {
  display: flex;
  align-items: center;
  gap: 4px;
  flex-shrink: 0;
}
.px-tb-nav-btn {
  padding: 6px 14px;
  border-radius: 7px;
  border: 1px solid rgba(255,255,255,.12);
  background: rgba(255,255,255,.06);
  color: var(--sb-text);
  font-size: .78rem;
  font-weight: 600;
  cursor: pointer;
  transition: background .15s;
  white-space: nowrap;
}
.px-tb-nav-btn:hover { background: rgba(255,255,255,.12); }
.px-tb-nav-btn:disabled { opacity: .35; cursor: not-allowed; }
.px-tb-nav-next {
  background: linear-gradient(135deg, #F5520C, #FF7040);
  border-color: transparent;
  box-shadow: 0 2px 8px rgba(245,82,12,.3);
}
.px-tb-nav-next:hover { opacity: .9; background: linear-gradient(135deg, #F5520C, #FF7040); }

/* Topbar tools */
.px-tb-tools {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}
.px-tb-tool {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 6px 12px;
  border-radius: 7px;
  border: none;
  font-size: .75rem;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transition: opacity .15s, transform .1s;
}
.px-tb-tool:hover { opacity: .85; transform: translateY(-1px); }
.px-tb-tool-ghost {
  background: rgba(255,255,255,.07);
  color: var(--sb-text);
  border: 1px solid rgba(255,255,255,.1);
}
.px-tb-tool-blue {
  background: #2563EB;
  color: #fff;
  box-shadow: 0 2px 8px rgba(37,99,235,.3);
}
.px-tb-tool-purple {
  background: linear-gradient(135deg, #F5520C, #FF7040);
  color: #fff;
  box-shadow: 0 2px 8px rgba(245,82,12,.3);
}
.px-tb-tool-audio {
  background: rgba(255,255,255,.07);
  color: var(--sb-text);
  border: 1px solid rgba(255,255,255,.1);
  padding: 6px 10px;
  font-size: .9rem;
}
.px-tb-tool-audio.playing {
  background: rgba(52,211,153,.15);
  border-color: #34D399;
  color: #34D399;
}
.px-tb-q-badge {
  background: rgba(255,255,255,.2);
  padding: 1px 6px;
  border-radius: 10px;
  font-size: .68rem;
}

/* Font size control */
.px-tb-font {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,255,255,.06);
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 7px;
  padding: 4px 10px;
}
.px-tb-aa {
  font-size: .78rem;
  font-weight: 700;
  color: var(--sb-muted);
  user-select: none;
}
.px-tb-font input[type=range] {
  width: 60px;
  height: 3px;
  accent-color: var(--sb-accent);
  cursor: pointer;
}

/* Theme buttons */
.px-tb-themes {
  display: flex;
  background: rgba(255,255,255,.06);
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 7px;
  overflow: hidden;
}
.px-tb-theme-btn {
  padding: 5px 9px;
  border: none;
  background: transparent;
  color: var(--sb-muted);
  cursor: pointer;
  font-size: .82rem;
  transition: background .15s;
}
.px-tb-theme-btn:hover { background: rgba(255,255,255,.08); }
.px-tb-theme-btn.active { background: rgba(255,255,255,.14); color: var(--sb-text); }

/* ── TABS ── */
.px-tabs {
  background: #fff;
  border-bottom: 1px solid #E2E8F0;
  display: flex;
  align-items: center;
  padding: 0 24px;
  height: var(--tab-h);
  flex-shrink: 0;
  gap: 0;
}
.px-tab {
  padding: 0 18px;
  height: var(--tab-h);
  font-size: .8rem;
  font-weight: 600;
  cursor: pointer;
  border: none;
  background: none;
  color: #64748B;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: color .15s, border-color .15s;
  white-space: nowrap;
}
.px-tab:hover { color: #0F172A; }
.px-tab.active { color: #F5520C; border-bottom-color: #F5520C; }

/* ── CONTENT AREA ── */
.px-content {
  flex: 1;
  overflow-y: auto;
  padding: 40px max(24px, 3.5vw);
  background: #F8FAFC;
  position: relative;
  --lesson-fs: 16px;
}
/* sepia theme */
.px-content.theme-sepia { background: #FBF7EF; }
.px-content.theme-sepia .px-lesson-card { background: #FAF4E8; color: #3D2B1F; }
.px-content.theme-sepia .px-lesson-card .lesson-body { color: #3D2B1F; }
/* dark theme */
.px-content.theme-dark { background: #0F172A; }
.px-content.theme-dark .px-lesson-card { background: #1E293B; color: #E2E8F0; border-color: rgba(255,255,255,.08); }
.px-content.theme-dark .px-lesson-card h1 { color: #F1F5F9; }
.px-content.theme-dark .px-lesson-card .lesson-body { color: #CBD5E1; }
.px-content.theme-dark .px-lesson-card .lesson-breadcrumb { color: #64748B; }
.px-content.theme-dark .lesson-body h3 { color: #E2E8F0; }

/* Lesson card */
.px-lesson-card {
  max-width: 780px;
  margin: 0 auto;
  background: #fff;
  border: 1px solid #E2E8F0;
  border-radius: 14px;
  padding: 44px 52px;
  box-shadow: 0 1px 3px rgba(0,0,0,.04), 0 4px 16px rgba(0,0,0,.04);
}
.px-lesson-card h1 {
  font-size: 1.6rem;
  font-weight: 800;
  color: #0F172A;
  line-height: 1.25;
  letter-spacing: -.03em;
  margin-bottom: 10px;
}
.px-lesson-card h1::after {
  content: '';
  display: block;
  height: 3px;
  width: 44px;
  background: linear-gradient(90deg, #F5520C, #FF7040);
  border-radius: 2px;
  margin-top: 14px;
}
.lesson-breadcrumb {
  font-size: .74rem;
  color: #94A3B8;
  margin-bottom: 28px;
  display: flex;
  align-items: center;
  gap: 6px;
  padding-top: 4px;
}
.lesson-body {
  font-size: var(--lesson-fs);
  line-height: 1.85;
  color: #334155;
}
.lesson-body h3 {
  font-size: .98rem;
  font-weight: 700;
  color: #0F172A;
  margin: 26px 0 10px;
}
.lesson-body p { margin-bottom: 14px; }
.lesson-body ul { margin: 0 0 14px 22px; }
.lesson-body ul li { margin-bottom: 8px; }
.lesson-body strong { color: #0F172A; }
.highlight {
  background: #FFFBEB;
  border-left: 3px solid #F59E0B;
  padding: 14px 18px;
  border-radius: 0 8px 8px 0;
  margin: 18px 0;
  font-size: .9rem;
  line-height: 1.7;
  color: #78350F;
}
.law-cite {
  background: #F0FDF4;
  border: 1px solid #BBF7D0;
  border-radius: 8px;
  padding: 12px 16px;
  font-size: .875rem;
  margin: 14px 0;
  font-style: italic;
  color: #14532D;
  line-height: 1.65;
}

/* ── STUDY TIMER ── */
.px-timer {
  position: absolute;
  top: 16px;
  right: 24px;
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--sb);
  border-radius: 10px;
  padding: 7px 12px;
  box-shadow: 0 4px 16px rgba(0,0,0,.25);
  z-index: 20;
}
.px-timer-btn {
  width: 24px; height: 24px;
  border-radius: 50%;
  border: none;
  background: rgba(255,255,255,.1);
  color: #E2E8F0;
  font-size: .75rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s;
}
.px-timer-btn:hover { background: rgba(255,255,255,.18); }
.px-timer-btn.playing { background: rgba(245,82,12,.3); color: #FF8C5A; }
.px-timer-display {
  font-size: .85rem;
  font-weight: 700;
  color: #E2E8F0;
  font-variant-numeric: tabular-nums;
  letter-spacing: .04em;
  min-width: 58px;
  text-align: center;
}

/* ── MIND MAP ── */
.mm-wrap {
  max-width: 820px;
  margin: 0 auto;
  padding: 40px 20px 60px;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.mm-root {
  background: linear-gradient(135deg, #F5520C, #FF7040);
  color: #fff;
  border-radius: 12px;
  padding: 13px 32px;
  font-weight: 800;
  font-size: 1rem;
  text-align: center;
  box-shadow: 0 4px 18px rgba(245,82,12,.35);
}
.mm-connector-v { width: 2px; background: #E2E8F0; }
.mm-branches-row {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  justify-content: center;
}
.mm-branch-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 7px;
  min-width: 132px;
  max-width: 180px;
}
.mm-branch-label {
  background: #FFF3EE;
  color: #D44208;
  border: 1.5px solid #FDBEA0;
  border-radius: 8px;
  padding: 7px 14px;
  font-size: .8rem;
  font-weight: 700;
  text-align: center;
  width: 100%;
}
.mm-leaves { display: flex; flex-direction: column; gap: 5px; width: 100%; }
.mm-leaf {
  background: #fff;
  border: 1px solid #E2E8F0;
  border-radius: 6px;
  padding: 5px 10px;
  font-size: .76rem;
  color: #334155;
  text-align: center;
  transition: border-color .12s, background .12s;
  cursor: default;
}
.mm-leaf:hover { border-color: #FF8C5A; background: #FFF3EE; color: #D44208; }
.mm-note {
  margin-top: 28px;
  font-size: .76rem;
  color: #94A3B8;
  text-align: center;
}

/* ── SOCRATIC REVIEW ── */
.socratic-wrap {
  max-width: 780px;
  margin: 0 auto;
  padding: 32px 0 60px;
}
.socratic-intro {
  background: #fff;
  border: 1px solid #E2E8F0;
  border-radius: 12px;
  padding: 18px 22px;
  margin-bottom: 20px;
  display: flex;
  gap: 14px;
  align-items: flex-start;
}
.socratic-avatar {
  width: 38px; height: 38px;
  border-radius: 50%;
  background: linear-gradient(135deg, #F5520C, #FF7040);
  display: flex; align-items: center; justify-content: center;
  font-size: .95rem;
  flex-shrink: 0;
}
.socratic-q-block {
  background: #fff;
  border: 1px solid #E2E8F0;
  border-radius: 12px;
  margin-bottom: 12px;
  overflow: hidden;
  transition: box-shadow .18s;
}
.socratic-q-block:focus-within,
.socratic-q-block.revealed { box-shadow: 0 0 0 2px #FFF3EE; border-color: #FF8C5A; }
.socratic-q-header {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 18px 20px 10px;
}
.socratic-q-num {
  width: 26px; height: 26px;
  background: #FFF3EE;
  color: #D44208;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: .73rem; font-weight: 800;
  flex-shrink: 0;
}
.socratic-q-text {
  font-size: .92rem;
  font-weight: 600;
  line-height: 1.55;
  flex: 1;
  padding-top: 2px;
  color: #0F172A;
}
.socratic-actions { display: flex; gap: 8px; padding: 0 20px 16px; flex-wrap: wrap; }
.socratic-hint-box, .socratic-answer-box {
  margin: 0 20px 14px;
  padding: 12px 16px;
  border-radius: 8px;
  font-size: .875rem;
  line-height: 1.65;
  display: none;
}
.socratic-hint-box { background: #FFFBEB; border-left: 3px solid #F59E0B; color: #78350F; }
.socratic-answer-box { background: #F0FDF4; border-left: 3px solid #10B981; color: #065F46; font-weight: 500; }
.socratic-hint-box.visible, .socratic-answer-box.visible { display: block; }

/* ── AI HELPER ── */
.ai-helper {
  max-width: 780px;
  margin: 20px auto 40px;
  background: #fff;
  border: 1px solid #E2E8F0;
  border-radius: 12px;
  padding: 20px 24px;
  display: flex;
  align-items: flex-start;
  gap: 14px;
}
.ai-avatar {
  width: 38px; height: 38px;
  border-radius: 50%;
  background: linear-gradient(135deg, #F5520C, #FF7040);
  display: flex; align-items: center; justify-content: center;
  font-size: .9rem; flex-shrink: 0;
}
.ai-helper-content { flex: 1; min-width: 0; }
.ai-helper-content h4 {
  font-size: .85rem;
  font-weight: 700;
  margin-bottom: 5px;
  color: #D44208;
}
.ai-helper-content > p {
  font-size: .84rem;
  line-height: 1.65;
  color: #64748B;
  margin-bottom: 10px;
}
.ai-helper-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
.ai-ask-row {
  display: flex;
  gap: 8px;
  margin-bottom: 0;
}
.ai-ask-input {
  flex: 1;
  padding: 8px 12px;
  border: 1.5px solid #E2E8F0;
  border-radius: 8px;
  font-size: .82rem;
  color: #0F172A;
  outline: none;
  transition: border-color .15s;
  font-family: inherit;
}
.ai-ask-input:focus { border-color: #FF8C5A; }
.ai-ask-input::placeholder { color: #CBD5E1; }
.ai-response {
  margin-top: 14px;
  border-radius: 10px;
  overflow: hidden;
}
.ai-loading {
  padding: 14px 16px;
  background: #FFF3EE;
  border: 1px solid #FDBEA0;
  border-radius: 10px;
  font-size: .83rem;
  color: #D44208;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
  animation: ai-pulse 1.4s ease-in-out infinite;
}
@keyframes ai-pulse { 0%,100%{opacity:1} 50%{opacity:.55} }
.ai-error {
  padding: 12px 16px;
  background: #FEF2F2;
  border: 1px solid #FECACA;
  border-radius: 10px;
  font-size: .83rem;
  color: #991B1B;
}
.ai-reply {
  background: #F8FAFC;
  border: 1px solid #E2E8F0;
  border-radius: 10px;
  padding: 16px 20px;
  font-size: .875rem;
  line-height: 1.75;
  color: #334155;
}
.ai-reply p { margin: 0 0 10px; }
.ai-reply p:last-child { margin-bottom: 0; }
.ai-reply strong { color: #0F172A; }
.ai-flashcard {
  background: #fff;
  border: 1.5px solid #FDBEA0;
  border-radius: 8px;
  padding: 10px 14px;
  margin: 8px 0;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.ai-fc-front { font-weight: 700; color: #D44208; font-size: .82rem; }
.ai-fc-back  { color: #334155; font-size: .82rem; }

/* ── QUIZ ── */
.lesson-quiz { max-width: 780px; margin: 24px auto 0; }
.quiz-card {
  background: #fff;
  border: 1px solid #E2E8F0;
  border-radius: 12px;
  padding: 24px;
}
.quiz-card h4 {
  font-size: .88rem;
  font-weight: 700;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
  color: #0F172A;
}
.quiz-option {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 11px 14px;
  border: 1.5px solid #E2E8F0;
  border-radius: 8px;
  margin-bottom: 8px;
  cursor: pointer;
  font-size: .875rem;
  transition: border-color .12s, background .12s;
  color: #334155;
}
.quiz-option:hover:not(.locked) { border-color: #FF8C5A; background: #FFF3EE; }
.quiz-option.correct { border-color: #10B981; background: #F0FDF4; color: #065F46; }
.quiz-option.wrong { border-color: #EF4444; background: #FEF2F2; color: #991B1B; }
.quiz-option.locked { pointer-events: none; }
.quiz-letter {
  width: 24px; height: 24px;
  border-radius: 50%;
  background: #F1F5F9;
  border: 1px solid #E2E8F0;
  display: flex; align-items: center; justify-content: center;
  font-size: .72rem; font-weight: 700;
  flex-shrink: 0; margin-top: 1px;
  color: #64748B;
}
.quiz-feedback { margin-top: 12px; font-size: .85rem; display: none; }
.quiz-retry-bar {
  display: flex; align-items: center; gap: 10px;
  margin-top: 10px;
  padding: 10px 14px;
  background: #FFFBEB;
  border-radius: 8px;
  font-size: .84rem;
  color: #78350F;
}

/* ── BOTTOM NAV ── */
.px-bottom-nav {
  background: #fff;
  border-top: 1px solid #E2E8F0;
  height: var(--bnav-h);
  padding: 0 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.px-bnav-label { font-size: .8rem; color: #94A3B8; font-weight: 600; }
.px-bnav-btn {
  padding: 8px 20px;
  border-radius: 8px;
  font-size: .82rem;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: all .15s;
}
.px-bnav-btn:disabled { opacity: .35; cursor: not-allowed; }
.px-bnav-prev {
  background: #F1F5F9;
  color: #475569;
  border: 1px solid #E2E8F0;
}
.px-bnav-prev:hover:not(:disabled) { background: #E2E8F0; }
.px-bnav-next {
  background: linear-gradient(135deg, #F5520C, #FF7040);
  color: #fff;
  box-shadow: 0 3px 12px rgba(245,82,12,.3);
}
.px-bnav-next:hover { opacity: .9; transform: translateY(-1px); }

/* Btn overrides for socratic/ai-helper */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 7px; border: none; font-size: .8rem; font-weight: 600; cursor: pointer; transition: all .15s; }
.btn-ghost { background: #F1F5F9; color: #475569; }
.btn-ghost:hover { background: #E2E8F0; }
.btn-sm { padding: 5px 11px; font-size: .76rem; }
.btn-primary { background: linear-gradient(135deg, #F5520C, #FF7040); color: #fff; }

/* ── HERO ── */
.px-hero {
  max-width: 780px;
  margin: 0 auto 24px;
  background: #fff;
  border: 1px solid #E2E8F0;
  border-radius: 14px;

  justify-content: space-between;

  font-weight: 700;

  background: #FFF3EE;
  border: 1px solid #FDBEA0;
  border-radius: 20px;
  padding: 3px 11px;

.px-hero-chips { display: flex; gap: 6px; align-items: center; }
.px-hero-chip {
  font-size: .69rem;
  font-weight: 600;
  color: #64748B;
  background: #F8FAFC;
  border: 1px solid #E2E8F0;
  border-radius: 20px;
  padding: 3px 10px;

.px-hero-title {
  font-size: 1.5rem;

.px-hero-segs-label {

.px-hps {

  flex-direction: column;

}
.px-hps-track {
  height: 4px;
  background: #F1F5F9;
  border-radius: 3px;
  overflow: hidden;
}
.px-hps-fill {
  height: 100%;
  border-radius: 3px;
  background: #E2E8F0;

.px-hps.active .px-hps-fill { background: linear-gradient(90deg, #F5520C, #FF7040); }
.px-hps.done   .px-hps-fill { background: #10B981; }
.px-hps-lbl {
  font-size: .67rem;
  font-weight: 600;
  color: #CBD5E1;
  display: flex;
  align-items: center;
  gap: 4px;
}
.px-hps.active .px-hps-lbl { color: #F5520C; }
.px-hps.done   .px-hps-lbl { color: #10B981; }

/* Hero dark/sepia */

<script>
Auth.requireAuth();

// ── Course data ──────────────────────────────────────────────────────────────
const COURSES = {
  prf: {
    title: '🚔 Extensivo PRF Interativo',
    modules: [
      {
        name: 'Língua Portuguesa',
        lessons: [
          {
            title: '1.1 Interpretação de Texto',
            summary: 'Interpretação de texto exige extrair o sentido real do autor, não apenas a transcrição literal. A banca CESPE distingue explícito e implícito. Use a estratégia de leitura em dois tempos: primeiro e último parágrafo para identificar o tema, depois leitura orientada pelas questões. Atenção especial aos conectivos que indicam contraste, conclusão e causa.',
            mindmap: {
              root: 'Interpretação de Texto',
              branches: [
                { label: 'Tipos de questão', nodes: ['Ideia principal', 'Inferência', 'Ref. pronominal', 'Sentido contextual'] },
                { label: 'CESPE cobra', nodes: ['Explícito vs Implícito', '"É possível inferir..."', 'Rel. entre parágrafos'] },
                { label: 'Estratégia', nodes: ['1º e último parágrafo', 'Leia as questões antes', 'Leitura orientada'] },
                { label: 'Conectivos', nodes: ['Adversidade: porém/mas', 'Conclusão: logo/assim', 'Causa: pois/porque'] },
              ]
            },
            socratic: [
              { q: 'Por que "inferir" é diferente de "transcrever" um trecho do texto? O que muda na sua leitura?', hint: 'Pense: inferir requer que você vá além do que está escrito — a conclusão precisa ser sustentada pelo texto, mas não está explícita nele.', answer: 'Transcrever é copiar literalmente — já inferir é concluir algo que o texto implica mas não diz diretamente. A banca testa se você leu com profundidade, não se decorou palavras.' },
              { q: 'Se você vê "porém" ou "todavia" numa frase, o que isso sinaliza sobre a relação entre as ideias antes e depois desse conectivo?', hint: 'Esses conectivos pertencem à família da adversidade — eles introduzem uma ideia que contrasta com a anterior.', answer: 'Sinalizam contraste ou oposição. A ideia que vem depois do "porém" vai contra ou limita a ideia anterior. É pista valiosa para questões de "o autor defende que…".' },
              { q: 'Por que a estratégia de ler primeiro e último parágrafo antes do texto completo economiza tempo na prova?', hint: 'O primeiro parágrafo geralmente apresenta o tema e a tese; o último geralmente conclui ou reforça o argumento central.', answer: 'Com tema e conclusão em mente, você lê o restante com foco — sabe o que o autor defende e consegue localizar onde cada questão está respondida, sem releitura total.' },
            ],
            content: `<h1>Interpretação de Texto</h1><div class="lesson-breadcrumb">Módulo 1 — Língua Portuguesa <span>›</span> Aula 1.1</div><div class="lesson-body"><p>A interpretação de texto é uma das habilidades mais exigidas nas provas da PRF e representa uma das maiores fontes de erros dos candidatos.</p><h3>O que é interpretar?</h3><p>Interpretar significa extrair o <strong>sentido real</strong> de um texto — ir além da leitura superficial e compreender o que o autor <em>quis dizer</em>, não apenas o que está escrito literalmente.</p><div class="highlight"><strong>Dica de prova:</strong> A banca CESPE/CEBRASPE cobra a distinção entre o que está <em>explícito</em> no texto (afirmado diretamente) e o que está <em>implícito</em> (pressupostos e inferências). Questões com "é possível inferir que…" pedem interpretação, não transcrição.</div><h3>Tipos de questão mais cobrados</h3><ul><li><strong>Ideia principal:</strong> Qual o tema central? Qual a tese do autor?</li><li><strong>Inferência:</strong> O que se pode concluir a partir do texto?</li><li><strong>Referência pronominal:</strong> A que/quem se refere o pronome?</li><li><strong>Sentido de palavras no contexto:</strong> O que X significa neste texto?</li><li><strong>Relações entre parágrafos:</strong> Como os parágrafos se relacionam?</li></ul><h3>Estratégia de leitura para prova</h3><p>Para provas de concurso, adote a leitura em dois tempos:</p><ul><li><strong>1ª leitura (30 seg):</strong> Leia apenas o primeiro e último parágrafo. Identifique o tema e a conclusão do autor.</li><li><strong>2ª leitura (orientada):</strong> Leia as questões antes do texto completo. Volte ao texto com o "filtro" das perguntas.</li></ul><div class="law-cite">"A questão que pede o que o texto diz é diferente da que pede o que você pensa sobre o texto." — Técnica básica de prova CESPE</div><h3>Marcadores textuais importantes</h3><p>Fique atento aos conectivos: <strong>porém, contudo, todavia, entretanto</strong> (adversidade/contraste); <strong>portanto, logo, assim</strong> (conclusão); <strong>pois, porque, já que, uma vez que</strong> (causa).</p></div>`,
            quiz: { q: 'De acordo com os princípios de interpretação textual, quando uma questão pede "é possível inferir que…", o candidato deve:', options: ['Copiar literalmente um trecho do texto', 'Extrair uma conclusão lógica a partir do que está expresso no texto', 'Expressar sua opinião pessoal sobre o tema', 'Ignorar o texto e responder com base no conhecimento geral'], correct: 1, explanation: 'Inferência é extrair uma conclusão que não está explícita no texto, mas que pode ser deduzida logicamente do que foi dito. Não é opinião pessoal nem transcrição literal.' }
          },
          {
            title: '1.2 Ortografia e Acentuação',
            summary: 'O Acordo Ortográfico de 2009 eliminou o trema em palavras portuguesas e removeu vários acentos diferenciais. Permanecem apenas pôde, pôr, e as formas de ter e vir no plural. O decreto 6.583 de 2008 promulgou o acordo com vigência plena a partir de 2016.',
            mindmap: { root: 'Ortografia e Acentuação', branches: [{ label: 'Acordo 2009', nodes: ['Decreto 6.583/2008', 'Vigência: 2016', 'Eliminou trema'] }, { label: 'Sem trema', nodes: ['questão', 'frequente', 'linguiça', 'tranquilo'] }, { label: 'Acentos mantidos', nodes: ['pôde vs pode', 'pôr vs por', 'têm / vêm'] }, { label: 'Acentos extintos', nodes: ['para (verbo)', 'pelo/pela', 'voo, zoo, oo'] }] },
            socratic: [{ q: 'Qual é a lógica por trás da distinção entre "pôde" e "pode"? O que justifica manter esse acento diferencial?', hint: 'Pense no tempo verbal: um é passado, outro é presente. Sem o acento, as duas formas seriam graficamente idênticas.', answer: '"Pôde" é pretérito perfeito (ele pôde ontem) e "pode" é presente (ele pode hoje). O acento evita ambiguidade — sem ele, não saberíamos o tempo verbal pela escrita.' }, { q: 'Por que a banca gosta de cobrar "linguiça", "frequente" e "tranquilo" em questões de ortografia?', hint: 'Essas palavras tinham trema antes de 2009 e muitos candidatos ainda escrevem com trema por hábito.', answer: 'São palavras onde o candidato mais erra por inércia de hábito antigo. O trema foi eliminado em 2009 e a banca explora esse ponto de confusão.' }],
            content: `<h1>Ortografia e Acentuação</h1><div class="lesson-breadcrumb">Módulo 1 — Língua Portuguesa <span>›</span> Aula 1.2</div><div class="lesson-body"><p>Após o Acordo Ortográfico de 2009, algumas regras mudaram. Para a PRF, é essencial dominar os casos que ainda geram dúvida.</p><h3>Eliminação do trema</h3><p>O trema foi eliminado de palavras portuguesas. Exceções: nomes próprios estrangeiros e seus derivados (Müller, mülleriano).</p><div class="highlight"><strong>Antes:</strong> qüestão, freqüente, lingüiça<br><strong>Agora:</strong> questão, frequente, linguiça</div><h3>Acento diferencial</h3><p>Foram eliminados vários acentos diferenciais. Mantidos apenas:</p><ul><li><strong>pôde</strong> (passado) x <strong>pode</strong> (presente)</li><li><strong>pôr</strong> (verbo) x <strong>por</strong> (preposição)</li><li>Formas verbais de ter/vir: <strong>ele tem / eles têm; ele vem / eles vêm</strong></li></ul><div class="law-cite">Decreto nº 6.583/2008 — Promulga o Acordo Ortográfico da Língua Portuguesa. Vigência plena a partir de 2016.</div></div>`,
            quiz: { q: 'Após o Acordo Ortográfico de 2009, qual das seguintes palavras está grafada CORRETAMENTE?', options: ['freqüente', 'linguiça', 'qüestão', 'cinqüenta'], correct: 1, explanation: '"Linguiça" é a grafia correta após o Acordo. As demais mantinham trema (freqüente, qüestão, cinqüenta) que foram eliminados.' }
          },
          {
            title: '1.3 Morfologia — Classes Gramaticais',
            summary: 'As dez classes gramaticais são cobradas em questões de interpretação, concordância e regência. O destaque vai para substantivos e pronomes — especialmente a identificação do referente pronominal. Pronomes relativos como que, o qual e cujo retomam o substantivo mais próximo, salvo quando o sentido exigir outro.',
            mindmap: { root: 'Classes Gramaticais', branches: [{ label: 'Variáveis', nodes: ['Substantivo', 'Artigo', 'Adjetivo', 'Numeral', 'Pronome', 'Verbo'] }, { label: 'Invariáveis', nodes: ['Advérbio', 'Preposição', 'Conjunção', 'Interjeição'] }, { label: 'CESPE cobra', nodes: ['Referente pronominal', 'Classificação mórfica', 'Função vs classe'] }, { label: 'Pronomes rel.', nodes: ['que / o qual', 'cujo (posse)', 'onde (lugar)', 'retomam o mais próximo'] }] },
            socratic: [{ q: 'Qual é a diferença entre a CLASSE de uma palavra e a FUNÇÃO que ela exerce na oração?', hint: 'Um substantivo pode funcionar como sujeito, objeto ou adjunto. A classe é fixa; a função muda conforme o contexto.', answer: 'A classe é a categoria da palavra (substantivo, verbo…) e não muda. A função é o papel que ela exerce na oração (sujeito, predicado, adjunto…) e depende do contexto. A CESPE cobra os dois separadamente.' }],
            content: `<h1>Morfologia — Classes Gramaticais</h1><div class="lesson-breadcrumb">Módulo 1 — Língua Portuguesa <span>›</span> Aula 1.3</div><div class="lesson-body"><p>As 10 classes gramaticais são cobradas em questões de interpretação, concordância e regência.</p><h3>Classe mais cobrada: substantivos e pronomes</h3><p>A banca frequentemente pede a identificação do referente pronominal (a que substantivo o pronome se refere) dentro de um texto.</p><div class="highlight"><strong>Regra prática:</strong> Pronomes relativos (que, o qual, cujo) retomam o substantivo mais próximo, salvo quando o sentido exigir outro referente.</div></div>`,
            quiz: { q: 'Na frase "O policial apreendeu o veículo, o qual estava com documentação irregular", o pronome relativo "o qual" refere-se a:', options: ['policial', 'veículo', 'documentação', 'apreensão'], correct: 1, explanation: '"O qual" retoma o substantivo imediatamente anterior — "veículo" — que é o termo a que se refere a oração adjetiva.' }
          },
        ]

      {
        name: 'Raciocínio Lógico',
        lessons: [
          {
            title: '2.1 Lógica Proposicional',
            summary: 'A lógica proposicional domina o raciocínio lógico na PRF. Os quatro conectivos fundamentais são: conjunção E, disjunção OU, condicional SE-ENTÃO e negação. A condicional é falsa somente quando o antecedente é verdadeiro e o consequente é falso. A negação da condicional equivale a p e não-q — esse é o ponto mais cobrado.',
            mindmap: { root: 'Lógica Proposicional', branches: [{ label: 'Conectivos', nodes: ['∧ conjunção (E)', '∨ disjunção (OU)', '→ condicional', '¬ negação'] }, { label: 'Condicional p→q', nodes: ['Falsa: p=V e q=F', 'Verdadeira: demais casos', 'Mnemônico: "Só mente quem promete e não cumpre"'] }, { label: 'Equivalências', nodes: ['¬(p→q) ≡ p∧¬q', 'p→q ≡ ¬p∨q', 'Contrapositiva: ¬q→¬p'] }] },
            socratic: [{ q: 'Por que a condicional "Se você estudar, passará" é VERDADEIRA mesmo quando o candidato não estudou e não passou?', hint: 'Pense: a promessa foi feita para quem estuda. Se o candidato não estudou, a promessa nem foi acionada.', answer: 'A condicional só é falsificada quando a condição (p) ocorre mas o resultado (q) não segue. Se p é falso, a proposição é verdadeira por convenção lógica — não houve como testar a promessa.' }, { q: 'Qual é a negação correta de "Se chover, o evento será cancelado"?', hint: 'Negação de p→q não é "Se não chover, o evento não será cancelado". Use a equivalência ¬(p→q) ≡ p∧¬q.', answer: '"Choveu E o evento não foi cancelado." A negação une o antecedente verdadeiro com o consequente falso — a única combinação que quebra a promessa.' }],
            content: `<h1>Lógica Proposicional</h1><div class="lesson-breadcrumb">Módulo 2 — Raciocínio Lógico <span>›</span> Aula 2.1</div><div class="lesson-body"><p>A lógica proposicional é o coração do Raciocínio Lógico na PRF. Dominar os conectivos e tabelas-verdade é obrigatório.</p><h3>Conectivos lógicos fundamentais</h3><ul><li><strong>p ∧ q</strong> (conjunção — E): verdadeiro só quando ambos são verdadeiros</li><li><strong>p ∨ q</strong> (disjunção inclusiva — OU): falso só quando ambos são falsos</li><li><strong>p → q</strong> (condicional — SE...ENTÃO): falso só quando p é V e q é F</li><li><strong>¬p</strong> (negação): inverte o valor lógico</li></ul><div class="highlight"><strong>Mnemônico:</strong> A condicional p→q só é FALSA quando o antecedente (p) é verdadeiro e o consequente (q) é falso. "Se você estudar (V), passará (F)" = falsa.</div><div class="law-cite">Negação da condicional: ¬(p→q) ≡ p ∧ ¬q — Guarde esta equivalência, ela aparece sempre.</div></div>`,
            quiz: { q: 'A proposição "Se o candidato estudar, então ele passará" é uma condicional p→q. Em qual caso esta proposição é FALSA?', options: ['O candidato estudou e passou', 'O candidato estudou e não passou', 'O candidato não estudou e passou', 'O candidato não estudou e não passou'], correct: 1, explanation: 'A condicional p→q é falsa APENAS quando p é verdadeiro (estudou) e q é falso (não passou). Nos outros casos, a condicional é verdadeira.' }
          },
          {
            title: '2.2 Diagramas de Venn',
            summary: 'Diagramas de Venn resolvem problemas de conjuntos muito cobrados na PRF. A fórmula principal é: A união B equivale a A mais B menos a intersecção de A e B. Sempre identifique o que é exclusivo de cada conjunto e o que pertence aos dois antes de calcular.',
            mindmap: { root: 'Diagramas de Venn', branches: [{ label: 'Fórmula 2 conj.', nodes: ['|A∪B| = |A|+|B|-|A∩B|', 'Evita dupla contagem', 'Identifique ∩ primeiro'] }, { label: 'Extensão 3 conj.', nodes: ['|A∪B∪C| =', 'A+B+C-∩AB-∩AC-∩BC+∩ABC', 'Raro na PRF'] }, { label: 'Armadilhas', nodes: ['Confundir união/intersecção', '"Apenas A": exclui ∩', '"Pelo menos um": união total'] }] },
            socratic: [{ q: 'Por que subtraímos a intersecção ao calcular a união de dois conjuntos? O que aconteceria se não subtraíssemos?', hint: 'Pense em quem pertence aos dois grupos ao mesmo tempo — essas pessoas seriam contadas duas vezes, uma em cada conjunto.', answer: 'Quem está na intersecção foi somado duas vezes (uma ao contar A, outra ao contar B). Subtrair a intersecção corrige essa dupla contagem e dá o total real de pessoas em pelo menos um dos grupos.' }],
            content: `<h1>Diagramas de Venn</h1><div class="lesson-breadcrumb">Módulo 2 — Raciocínio Lógico <span>›</span> Aula 2.2</div><div class="lesson-body"><p>Diagramas de Venn resolvem problemas de conjuntos — muito cobrados em questões de "quantos pertencem a pelo menos um grupo".</p><h3>Fórmula para dois conjuntos</h3><p><strong>|A ∪ B| = |A| + |B| − |A ∩ B|</strong></p><div class="highlight">Em uma turma de 40 alunos, 25 estudam Português, 20 estudam Matemática e 10 estudam as duas disciplinas. Quantos estudam pelo menos uma? 25 + 20 − 10 = <strong>35 alunos</strong>.</div></div>`,
            quiz: { q: 'De 100 policiais, 60 são habilitados em moto (A) e 45 em veículo pesado (B). Se 20 possuem as duas habilitações, quantos policiais possuem pelo menos uma habilitação?', options: ['85', '105', '80', '65'], correct: 0, explanation: '|A ∪ B| = |A| + |B| − |A ∩ B| = 60 + 45 − 20 = 85 policiais.' }
          },
        ]

      {
        name: 'Legislação de Trânsito',
        lessons: [
          {
            title: '3.1 CTB — Parte Geral',
            summary: 'O CTB é a lei mais cobrada nas provas da PRF, instituído pela Lei 9.503 de 1997. O Sistema Nacional de Trânsito tem o CONTRAN no topo como órgão máximo normativo. A PRF fiscaliza exclusivamente rodovias federais. As definições básicas do artigo primeiro distinguem via de pista, e rodovia de estrada pela presença ou ausência de pavimentação.',
            mindmap: { root: 'CTB — Lei 9.503/1997', branches: [{ label: 'SNT (hierarquia)', nodes: ['CONTRAN (normativo)', 'SENATRAN (exec. federal)', 'CETRAN/CONTRANDIFE', 'DETRAN (exec. estadual)', 'PRF (rodovias fed.)'] }, { label: 'Definições Art. 1º', nodes: ['Via = pista+calçada+acost.', 'Rodovia = rural pavimentada', 'Estrada = rural NÃO pavim.', 'Pista = parte p/ veículos'] }, { label: 'Atualizações', nodes: ['Lei 14.071/2020 (CNH)', 'Art. 1º caput', 'Vigência nacional'] }] },
            socratic: [{ q: 'Qual é a distinção prática entre RODOVIA e ESTRADA segundo o CTB? Por que essa diferença importa para as atribuições da PRF?', hint: 'A diferença está na pavimentação — e a PRF só tem competência sobre um dos dois tipos.', answer: 'Rodovia é via rural PAVIMENTADA; estrada é rural NÃO PAVIMENTADA. A PRF fiscaliza rodovias federais (pavimentadas). Numa estrada de terra federal, outro órgão assumiria. A banca cobra exatamente isso para confundir quem associa PRF a "qualquer via fora da cidade".' }, { q: 'O CONTRAN e o DETRAN fazem parte do mesmo sistema. Qual é a diferença fundamental de competência entre eles?', hint: 'Um é normativo (cria regras) e o outro é executivo estadual (implementa regras, licencia e registra veículos).', answer: 'O CONTRAN é o órgão máximo NORMATIVO — ele edita as normas do trânsito nacional. O DETRAN é o órgão executivo estadual — ele implementa as normas, cuida do registro e licenciamento de veículos e da habilitação no estado.' }],
            content: `<h1>CTB — Código de Trânsito Brasileiro</h1><div class="lesson-breadcrumb">Módulo 3 — Legislação de Trânsito <span>›</span> Aula 3.1</div><div class="lesson-body"><p>O CTB (Lei nº 9.503/1997) é a lei mais cobrada nas provas da PRF. É essencial conhecer a estrutura, os órgãos e as definições.</p><h3>Estrutura do SNT (Sistema Nacional de Trânsito)</h3><ul><li><strong>CONTRAN</strong> — Conselho Nacional de Trânsito (órgão máximo normativo)</li><li><strong>SENATRAN</strong> — Secretaria Nacional de Trânsito (órgão executivo federal)</li><li><strong>CETRAN / CONTRANDIFE</strong> — Conselhos Estaduais e do DF</li><li><strong>DETRAN</strong> — Departamento Estadual de Trânsito (executivo estadual)</li><li><strong>PRF</strong> — Fiscalização das rodovias federais</li></ul><div class="highlight"><strong>Art. 1º CTB:</strong> "O trânsito de qualquer natureza nas vias terrestres do território nacional, abertas à circulação, rege-se por este Código."</div><h3>Definições essenciais (Art. 1º, §1º)</h3><ul><li><strong>Via:</strong> superfície por onde transitam veículos, pessoas e animais</li><li><strong>Pista:</strong> parte da via utilizada para a circulação de veículos</li><li><strong>Rodovia:</strong> via rural pavimentada</li><li><strong>Estrada:</strong> via rural não pavimentada</li></ul><div class="law-cite">Lei nº 9.503/1997 — Código de Trânsito Brasileiro. Com as alterações da Lei nº 14.071/2020 (Lei da CNH).</div></div>`,
            quiz: { q: 'De acordo com o CTB, a diferença entre RODOVIA e ESTRADA é:', options: ['Rodovia tem mais de 2 pistas; estrada tem apenas 1', 'Rodovia é via rural pavimentada; estrada é via rural não pavimentada', 'Rodovia é federal; estrada é estadual', 'Rodovia tem acostamento; estrada não tem'], correct: 1, explanation: 'O CTB define: rodovia = via rural PAVIMENTADA; estrada = via rural NÃO PAVIMENTADA. A distinção não é sobre número de pistas nem sobre jurisdição.' }
          },
          {
            title: '3.2 SNT — Órgãos e Competências',
            summary: 'A PRF integra o Sistema Nacional de Trânsito e suas competências estão no artigo 20 do CTB. São atribuições específicas da PRF: fiscalizar rodovias federais, credenciar serviços de escolta, levantar dados de acidentes e aplicar as penalidades cabíveis. O registro e a habilitação são do DETRAN; a normatização é do CONTRAN.',
            mindmap: { root: 'Competências SNT', branches: [{ label: 'PRF (Art. 20)', nodes: ['Fiscaliza rodovias fed.', 'Credencia escolta', 'Dados de acidentes', 'Aplica penalidades'] }, { label: 'DETRAN', nodes: ['Registro de veículos', 'Licenciamento', 'Habilitação (CNH)', 'Fiscalização estadual'] }, { label: 'CONTRAN', nodes: ['Normas gerais', 'Sinalização nacional', 'Órgão máximo', 'Recurso final'] }] },
            socratic: [{ q: 'Um policial rodoviário federal aborda um veículo em uma rodovia estadual. Ele tem competência para autuar? Por quê?', hint: 'A competência da PRF é sobre RODOVIAS FEDERAIS. Em via estadual, quem tem competência é a PM ou órgão estadual de trânsito.', answer: 'Em regra, não — a PRF tem competência específica nas RODOVIAS FEDERAIS. Em rodovias estaduais, a competência é da PM ou do órgão estadual. Há exceções em situações de flagrante ou convênios, mas a regra geral cobra essa delimitação.' }],
            content: `<h1>SNT — Órgãos e Competências</h1><div class="lesson-breadcrumb">Módulo 3 — Legislação de Trânsito <span>›</span> Aula 3.2</div><div class="lesson-body"><p>A PRF integra o Sistema Nacional de Trânsito. Conhecer as competências de cada órgão é questão certa de prova.</p><h3>Competências da PRF (Art. 20 CTB)</h3><ul><li>Cumprir e fazer cumprir a legislação de trânsito nas rodovias federais</li><li>Realizar levantamento de dados estatísticos de acidentes de trânsito</li><li>Credenciar os serviços de escolta, fiscalizar e adotar medidas de segurança</li><li>Executar fiscalização de trânsito, aplicando as penalidades e medidas administrativas cabíveis</li></ul><div class="highlight"><strong>Atenção:</strong> A PRF fiscaliza RODOVIAS FEDERAIS. A PM fiscaliza vias estaduais e municipais. O DETRAN cuida do registro e habilitação.</div></div>`,
            quiz: { q: 'De acordo com o Art. 20 do CTB, é competência ESPECÍFICA da PRF:', options: ['Registrar e licenciar veículos automotores', 'Credenciar os serviços de escolta nas rodovias federais', 'Fixar as normas e os padrões de sinalização de trânsito', 'Fiscalizar o transporte coletivo estadual'], correct: 1, explanation: 'O credenciamento de serviços de escolta nas rodovias federais é competência específica da PRF, conforme Art. 20, VI do CTB.' }
          },

      {

          {
            title: '4.1 Princípios Fundamentais',
            summary: 'Os artigos 1 a 4 da CF de 1988 estabelecem fundamentos e objetivos da República. Os cinco fundamentos do artigo 1 são memorizados com o acrônimo SOVED: Soberania, Cidadania, Dignidade da pessoa humana, Valores sociais do trabalho e livre iniciativa, e Pluralismo político. Os objetivos do artigo 3 são lembrados por CEGA: Construir, Erradicar, Garantir desenvolvimento e promover o bem de Todos.',
            mindmap: { root: 'Princípios Fundamentais CF/88', branches: [{ label: 'Art. 1º — SOVED', nodes: ['Soberania', 'Cidadania', 'Dignidade (DPH)', 'Valores sociais', 'Pluralismo político'] }, { label: 'Art. 3º — CEGA', nodes: ['Construir soc. justa', 'Erradicar pobreza', 'Garantir desenvolvimento', 'Promover bem de todos'] }, { label: 'Art. 4º — Rel. int.', nodes: ['Autodeterminação', 'Não-intervenção', 'Igualdade entre estados', 'Defesa da paz'] }] },
            socratic: [{ q: 'Por que "Dignidade da pessoa humana" é considerada o fundamento mais importante da CF/88, mesmo sem hierarquia formal entre os fundamentos?', hint: 'Pense na base de onde decorrem os demais direitos fundamentais — liberdade, igualdade, saúde, educação.', answer: 'A dignidade é o núcleo axiológico da Constituição — é o valor do qual irradiam todos os direitos fundamentais. Sem ela, os outros fundamentos perdem sentido. A jurisprudência do STF frequentemente a usa como fundamento em decisões sobre outros direitos.' }, { q: 'O que diferencia os FUNDAMENTOS (Art. 1º) dos OBJETIVOS (Art. 3º) da República?', hint: 'Fundamentos são o "o que somos"; objetivos são o "para onde vamos".', answer: 'Fundamentos são os pilares identitários do Estado — o que caracteriza e define o Brasil como Estado Democrático de Direito. Objetivos são metas a serem alcançadas — programas de ação para o futuro. Um é ser; o outro é dever-ser.' }],
            content: `<h1>Princípios Fundamentais da CF/88</h1><div class="lesson-breadcrumb">Módulo 4 — Direito Constitucional <span>›</span> Aula 4.1</div><div class="lesson-body"><p>Os artigos 1º a 4º da CF/88 estabelecem os fundamentos e objetivos da República — questão certa em todo edital PRF.</p><h3>Art. 1º — Fundamentos (SOVED)</h3><ul><li><strong>S</strong>oberania</li><li><strong>O</strong> = Cidadania</li><li><strong>V</strong>alores sociais do trabalho e da livre iniciativa</li><li><strong>E</strong> = Dignidade da pessoa humana</li><li><strong>D</strong> = Pluralismo político</li></ul><div class="highlight"><strong>Mnemônico SOVED:</strong> Soberania, Cidadania, Dignidade da pessoa humana, Valores sociais do trabalho/livre iniciativa, Pluralismo político.</div><h3>Art. 3º — Objetivos Fundamentais (CEGA)</h3><ul><li><strong>C</strong>onstruir uma sociedade livre, justa e solidária</li><li><strong>E</strong>rradicar a pobreza, a marginalização e reduzir desigualdades</li><li><strong>G</strong>arantir o desenvolvimento nacional</li><li><strong>A</strong> = Promover o bem de todos sem preconceitos</li></ul><div class="law-cite">CF/88, Art. 1º: "A República Federativa do Brasil, formada pela união indissolúvel dos Estados e Municípios e do Distrito Federal, constitui-se em Estado Democrático de Direito e tem como fundamentos..."</div></div>`,
            quiz: { q: 'São fundamentos da República Federativa do Brasil, previstos no Art. 1º da CF/88:', options: ['Soberania, Cidadania e Garantia do desenvolvimento nacional', 'Soberania, Cidadania, Dignidade da pessoa humana, Valores sociais do trabalho e Pluralismo político', 'Democracia, Igualdade, Liberdade, Fraternidade e Justiça', 'Soberania, Federalismo, Separação de poderes e Direitos humanos'], correct: 1, explanation: 'Os 5 fundamentos do Art. 1º CF são: Soberania, Cidadania, Dignidade da pessoa humana, Valores sociais do trabalho e da livre iniciativa, e Pluralismo político — memorizados com o acrônimo SOVED.' }
          },

      {
        name: 'Direito Administrativo',
        lessons: [
          {
            title: '5.1 Princípios LIMPE',
            summary: 'O artigo 37 da CF de 1988 lista os princípios expressos da Administração Pública, memorizados por LIMPE: Legalidade, Impessoalidade, Moralidade, Publicidade e Eficiência. A eficiência foi acrescentada pela Emenda Constitucional 19 de 1998, conhecida como Reforma Administrativa. O princípio da legalidade administrativa é mais restritivo do que o aplicado aos particulares: o administrador só pode fazer o que a lei expressamente autoriza.',

// ── State ────────────────────────────────────────────────────────────────────
let courseKey   = 'prf';
let flatLessons = [];
let currentFlat = 0;
let completed   = new Set();
let currentView = 'content';
let quizAttempts = {};
let speechUtterance = null;
let timerSeconds = 3600;
let timerRunning = false;
let timerInterval = null;

// ── Init ─────────────────────────────────────────────────────────────────────
function init() {
  const params = new URLSearchParams(location.search);
  courseKey = params.get('curso') || 'prf';
  const course = COURSES[courseKey];
  if (!course) { location.href = 'cursos-app.html'; return; }

  const saved = localStorage.getItem(`pvx_progress_${courseKey}`);
  if (saved) completed = new Set(JSON.parse(saved));

  document.getElementById('sb-title').textContent = course.title;
  document.title = course.title + ' — Prova X';

  const user = Auth.getUser();
  const isPro = user && (user.plan === 'pro' || user.plan === 'diamond' || user.plan === 'gold');
  if (isPro) {
    const notice = document.getElementById('sb-notice');
    if (notice) notice.style.display = 'none';
  }

  buildFlatList(course);
  document.getElementById('sb-count').textContent = flatLessons.length + ' de ' + flatLessons.length + ' tópicos disponíveis';
  buildSidebar(course);
  goToLesson(Number(params.get('aula') || 0));
  updateTimerDisplay();

  // Scroll → reading progress
  document.getElementById('px-content').addEventListener('scroll', function() {
    if (currentView !== 'content') return;
    const max = this.scrollHeight - this.clientHeight;
    if (max <= 0) return;
    const pct = Math.min(100, Math.round((this.scrollTop / max) * 100));
    const prog = getLessonProg(currentFlat);
    if (pct > prog.readPct) { prog.readPct = pct; updateHeroProgress(); }
  });
}

function buildFlatList(course) {
  flatLessons = [];
  course.modules.forEach((mod, mi) => {
    mod.lessons.forEach((les, li) => {
      flatLessons.push({ moduleIdx: mi, lessonIdx: li, title: les.title });
    });
  });
}

function buildSidebar(course) {
  const container = document.getElementById('px-modules');
  container.innerHTML = '';
  const user = Auth.getUser();
  const isPro = user && (user.plan === 'pro' || user.plan === 'diamond' || user.plan === 'gold');

  course.modules.forEach((mod, mi) => {
    const modNum = mi + 1;
    const group = document.createElement('div');
    group.className = 'px-sb-mod-group';

    const doneCt = mod.lessons.filter((_, li) => {
      const fi = flatLessons.findIndex(f => f.moduleIdx === mi && f.lessonIdx === li);
      return completed.has(fi);
    }).length;
    if (doneCt === mod.lessons.length) group.classList.add('all-done');

    const header = document.createElement('div');
    header.className = 'px-sb-mod-header open';
    header.innerHTML = `
      <div class="px-sb-mod-badge">${modNum}</div>
      <span class="px-sb-mod-name">${mod.name}</span>
      <span class="px-sb-mod-meta">${doneCt}/${mod.lessons.length}</span>
      <span class="px-sb-mod-arrow">▾</span>
    `;

    const lessonList = document.createElement('div');
    lessonList.className = 'px-sb-lessons open';

    header.onclick = () => {
      header.classList.toggle('open');
      lessonList.classList.toggle('open');
    };

    mod.lessons.forEach((les, li) => {
      const flatIdx = flatLessons.findIndex(f => f.moduleIdx === mi && f.lessonIdx === li);
      const isDone  = completed.has(flatIdx);
      const isLocked = !isPro && flatIdx >= 3;
      // strip leading decimal number from title
      const shortTitle = les.title.replace(/^\d+\.\d+\s+/, '');
      const lessonNum  = `${modNum}.${li + 1}`;

      const item = document.createElement('div');
      item.className = 'px-sb-lesson'
        + (isDone ? ' done' : '')
        + (flatIdx === currentFlat ? ' active' : '')
        + (isLocked ? ' locked' : '');
      item.id = `lesson-item-${flatIdx}`;
      item.innerHTML = `
        <div class="px-sb-les-check ${isDone ? 'checked' : ''}">${isDone ? '✓' : ''}</div>
        <span class="px-sb-les-num">${lessonNum}</span>
        <span class="px-sb-les-name">${shortTitle}</span>
        ${isLocked ? '<span class="px-sb-lock">🔒</span>' : ''}
      `;
      if (!isLocked) item.onclick = () => goToLesson(flatIdx);
      lessonList.appendChild(item);
    });

    group.appendChild(header);
    group.appendChild(lessonList);
    container.appendChild(group);
  });
}

function getLesson(idx) {
  const { moduleIdx, lessonIdx } = flatLessons[idx];
  return COURSES[courseKey].modules[moduleIdx].lessons[lessonIdx];
}

function goToLesson(idx) {
  if (idx < 0 || idx >= flatLessons.length) return;
  stopSpeech();
  currentFlat = idx;
  currentView = 'content';

  document.querySelectorAll('.px-sb-lesson').forEach(el => el.classList.remove('active'));
  const activeItem = document.getElementById(`lesson-item-${idx}`);
  if (activeItem) { activeItem.classList.add('active'); activeItem.scrollIntoView({ block: 'nearest' }); }

  ['content','mindmap','socratic'].forEach(v => {
    const t = document.getElementById(`tab-${v}`);
    if (t) t.classList.toggle('active', v === 'content');
  });
  renderView('content');

  const lesTitle = flatLessons[idx].title;
  document.getElementById('tb-lesson-name').textContent = lesTitle;
  document.getElementById('tb-prev').disabled = idx === 0;
  const isLast = idx === flatLessons.length - 1;
  document.getElementById('tb-next').textContent = isLast ? '✓ Concluir' : 'Próximo →';
  document.getElementById('btn-prev').disabled = idx === 0;
  document.getElementById('btn-next').textContent = isLast ? '✓ Concluir curso' : 'Concluir e avançar →';
  document.getElementById('nav-label').textContent = `Aula ${idx + 1} de ${flatLessons.length}`;
  updateProgress();

  const url = new URL(location);
  url.searchParams.set('curso', courseKey);
  url.searchParams.set('aula', idx);
  history.replaceState({}, '', url);
}

// ── Views ─────────────────────────────────────────────────────────────────────
function switchView(view) {
  stopSpeech();
  if (view === 'socratic') { getLessonProg(currentFlat).socraticDone = true; }
  currentView = view;
  ['content','mindmap','socratic'].forEach(v => {
    const t = document.getElementById(`tab-${v}`);
    if (t) t.classList.toggle('active', v === view);
  });
  renderView(view);
}

function renderView(view) {
  const lesson = getLesson(currentFlat);
  const content = document.getElementById('px-content');
  const timerEl = document.getElementById('px-timer');

  // Remove content but keep timer
  const children = Array.from(content.children).filter(c => c !== timerEl);
  children.forEach(c => c.remove());
  content.scrollTop = 0;

  let html = '';
  if (view === 'content') {
    // Strip h1 + breadcrumb from card — hero provides them
    const tmp = document.createElement('div');
    tmp.innerHTML = lesson.content;
    const h1 = tmp.querySelector('h1'); if (h1) h1.remove();
    const bc = tmp.querySelector('.lesson-breadcrumb'); if (bc) bc.remove();
    html = `${renderHero(lesson, currentFlat)}
      <div class="px-lesson-card">${tmp.innerHTML}</div>
      ${lesson.quiz ? renderQuiz(lesson.quiz, currentFlat) : ''}
      ${renderAiHelper(lesson)}`;
  } else if (view === 'mindmap') {
    html = lesson.mindmap ? renderMindMap(lesson) : emptyState('🗺', 'Mapa mental não disponível para esta aula.');
  } else if (view === 'socratic') {
    html = lesson.socratic ? renderSocratic(lesson) : emptyState('🧠', 'Revisão socrática não disponível para esta aula.');
  }

  const wrapper = document.createElement('div');
  wrapper.style.flex = '1';
  wrapper.innerHTML = html;
  content.appendChild(wrapper);
}

function emptyState(icon, msg) {
  return `<div style="max-width:780px;margin:60px auto;text-align:center;color:#94A3B8;padding:40px 20px;">
    <div style="font-size:2.5rem;margin-bottom:14px;">${icon}</div>
    <p style="font-size:.95rem;">${msg}</p>
  </div>`;
}

// ── Mind Map ──────────────────────────────────────────────────────────────────
function renderMindMap(lesson) {
  const mm = lesson.mindmap;
  const branchesHtml = mm.branches.map(b => `
    <div class="mm-branch-col">
      <div class="mm-branch-label">${b.label}</div>
      <div class="mm-leaves">${b.nodes.map(n => `<div class="mm-leaf">${n}</div>`).join('')}</div>
    </div>`).join('');
  return `<div class="mm-wrap">
    <div class="mm-root">${mm.root}</div>
    <div class="mm-connector-v" style="height:22px;"></div>
    <div class="mm-branches-row">${branchesHtml}</div>
    <p class="mm-note">Passe o cursor sobre os nós para destacá-los · Use junto com a Revisão Socrática para fixar o conteúdo</p>
  </div>`;
}

// ── Socratic Review ───────────────────────────────────────────────────────────
function renderSocratic(lesson) {
  const blocks = lesson.socratic.map((item, i) => `
    <div class="socratic-q-block" id="sq-block-${i}">
      <div class="socratic-q-header">
        <div class="socratic-q-num">${i + 1}</div>
        <div class="socratic-q-text">${item.q}</div>
      </div>
      <div class="socratic-hint-box" id="sq-hint-${i}">${item.hint}</div>
      <div class="socratic-answer-box" id="sq-ans-${i}">${item.answer}</div>
      <div class="socratic-actions">
        <button class="btn btn-ghost btn-sm" onclick="toggleSocratic('hint',${i})">💡 Ver dica</button>
        <button class="btn btn-ghost btn-sm" onclick="toggleSocratic('answer',${i})">✅ Ver resposta</button>
      </div>
    </div>`).join('');
  return `<div class="socratic-wrap">
    <div class="socratic-intro">
      <div class="socratic-avatar">✨</div>
      <div>
        <div style="font-size:.85rem;font-weight:700;color:#D44208;margin-bottom:4px;">Athena AI — Revisão Socrática</div>
        <div style="font-size:.84rem;color:#64748B;line-height:1.6;">Reflita sobre cada pergunta antes de revelar a dica ou resposta. O esforço de recuperação ativa fortalece a memória muito mais do que reler o conteúdo.</div>
      </div>
    </div>
    ${blocks}
  </div>`;
}

function toggleSocratic(type, idx) {
  const el = document.getElementById(type === 'hint' ? `sq-hint-${idx}` : `sq-ans-${idx}`);
  const block = document.getElementById(`sq-block-${idx}`);
  if (!el) return;
  el.classList.toggle('visible');
  if (el.classList.contains('visible')) block.classList.add('revealed');
}

// ── Audio TTS ─────────────────────────────────────────────────────────────────
function speakSummary() {
  const lesson = getLesson(currentFlat);
  const btn = document.getElementById('audio-btn');
  if (!lesson.summary) { alert('Resumo em áudio não disponível para esta aula.'); return; }
  if (speechSynthesis.speaking) { stopSpeech(); return; }

  const utter = new SpeechSynthesisUtterance(lesson.summary);
  utter.lang = 'pt-BR';
  utter.rate = 0.92;
  const voices = speechSynthesis.getVoices();
  const ptVoice = voices.find(v => v.lang.startsWith('pt'));
  if (ptVoice) utter.voice = ptVoice;
  utter.onstart = () => { btn.classList.add('playing'); btn.textContent = '⏹'; getLessonProg(currentFlat).audioDone = true; updateHeroProgress(); };
  utter.onend = utter.onerror = () => { btn.classList.remove('playing'); btn.textContent = '🎧'; };
  speechUtterance = utter;
  speechSynthesis.speak(utter);
}

function stopSpeech() {
  if (speechSynthesis.speaking) speechSynthesis.cancel();
  const btn = document.getElementById('audio-btn');
  if (btn) { btn.classList.remove('playing'); btn.textContent = '🎧'; }
}

// ── Quiz ──────────────────────────────────────────────────────────────────────
function renderQuiz(quiz, flatIdx) {
  const letters = ['A', 'B', 'C', 'D'];
  const isDone = completed.has(flatIdx);
  return `<div class="lesson-quiz">
    <div class="quiz-card" id="quiz-${flatIdx}">
      <h4>📝 Questão de fixação</h4>
      <p style="font-size:.9rem;line-height:1.65;margin-bottom:16px;">${quiz.q}</p>
      <div id="quiz-options-${flatIdx}">
        ${quiz.options.map((opt, i) => `
          <div class="quiz-option${isDone && i === quiz.correct ? ' correct locked' : ''}" data-idx="${i}"
               onclick="answerQuiz(${flatIdx},${i},${quiz.correct})">
            <div class="quiz-letter">${letters[i]}</div>
            <span>${opt}</span>
          </div>`).join('')}
      </div>
      <div class="quiz-feedback" id="quiz-feedback-${flatIdx}"></div>
    </div>
  </div>`;
}

function answerQuiz(flatIdx, chosen, correct) {
  const card = document.getElementById(`quiz-${flatIdx}`);
  if (!card || card.querySelector('.correct')) return;
  if (!quizAttempts[flatIdx]) quizAttempts[flatIdx] = 0;
  const attempts = quizAttempts[flatIdx];
  const options = card.querySelectorAll('.quiz-option');
  const feedback = document.getElementById(`quiz-feedback-${flatIdx}`);
  const explanation = getLesson(flatIdx).quiz.explanation;

  if (chosen === correct) {
    options.forEach((opt, i) => { opt.classList.add('locked'); if (i === correct) opt.classList.add('correct'); });
    feedback.style.display = 'block';
    feedback.innerHTML = `<span style="color:#10B981;font-weight:700;">✓ Correto!</span> ${explanation}`;
    getLessonProg(flatIdx).quizDone = true; updateHeroProgress();
    return;
  }

  quizAttempts[flatIdx] = attempts + 1;
  options[chosen].classList.add('wrong');

  if (attempts + 1 >= 2) {
    options.forEach((opt, i) => { opt.classList.add('locked'); if (i === correct) opt.classList.add('correct'); });
    feedback.style.display = 'block';
    feedback.innerHTML = `<span style="color:#EF4444;font-weight:700;">✗ Incorreto.</span> ${explanation}`;
    getLessonProg(flatIdx).quizDone = true; updateHeroProgress();
    return;
  }

  feedback.style.display = 'block';
  feedback.innerHTML = `<div class="quiz-retry-bar">
    <span>✗ Incorreto. Você ainda tem mais uma tentativa.</span>
    <button class="btn btn-sm btn-ghost" onclick="retryQuiz(${flatIdx},${correct})">Tentar novamente</button>
  </div>`;
}

function retryQuiz(flatIdx) {
  const card = document.getElementById(`quiz-${flatIdx}`);
  if (!card) return;
  card.querySelectorAll('.quiz-option').forEach(o => o.classList.remove('wrong','correct','locked'));
  const fb = document.getElementById(`quiz-feedback-${flatIdx}`);
  if (fb) { fb.style.display = 'none'; fb.innerHTML = ''; }
}

// ── AI Helper ─────────────────────────────────────────────────────────────────
const AI_URL = 'https://fkwivsebcbuxvobcpina.supabase.co/functions/v1/ai-tutor';

function renderAiHelper(lesson) {
  const idx   = currentFlat;
  const title = lesson.title.replace(/^\d+\.\d+\s+/, '');
  return `<div class="ai-helper" id="ai-helper-${idx}">
    <div class="ai-avatar">✨</div>
    <div class="ai-helper-content">
      <h4>Sócrates — Tutor IA</h4>
      <p>Estudo ativo sobre <em>${title}</em>. Selecione uma ação ou faça uma pergunta.</p>
      <div class="ai-helper-actions">
        <button class="btn btn-ghost btn-sm" onclick="callAI('explicar','',null,${idx})">💡 Explicar diferente</button>
        <button class="btn btn-ghost btn-sm" onclick="callAI('resumo','',null,${idx})">📋 Resumo rápido</button>
        <button class="btn btn-ghost btn-sm" onclick="callAI('flashcard','',null,${idx})">🃏 Flashcards</button>
        <button class="btn btn-ghost btn-sm" onclick="callAI('questao','',null,${idx})">📝 Nova questão</button>
      </div>
      <div class="ai-ask-row">
        <input class="ai-ask-input" id="ai-input-${idx}" placeholder="Pergunte algo sobre esta aula..."
          onkeydown="if(event.key==='Enter')callAI('duvida','',this.value,${idx})">
        <button class="btn btn-primary btn-sm"
          onclick="callAI('duvida','',document.getElementById('ai-input-${idx}').value,${idx})">Enviar →</button>
      </div>
      <div class="ai-response" id="ai-resp-${idx}" style="display:none"></div>
    </div>
  </div>`;
}

async function callAI(action, text, question, flatIdx) {
  const resp = document.getElementById(`ai-resp-${flatIdx}`);
  if (!resp) return;
  resp.style.display = 'block';
  resp.innerHTML = '<div class="ai-loading">✨ Sócrates está pensando...</div>';

  const lesson = getLesson(flatIdx);
  const lessonTitle = lesson.title.replace(/^\d+\.\d+\s+/, '');

  try {
    const res = await fetch(AI_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        action,
        text:   text || lesson.summary || '',
        question: question || '',
        lessonTitle,
      }),
    });

    const data = await res.json();

    if (data.error) {
      resp.innerHTML = `<div class="ai-error">⚠️ ${data.error}</div>`;
      return;
    }

    const raw = (data.reply || '').trim();
    // Render flashcard pairs, bold, paragraphs
    const formatted = raw
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .split(/\n\n+/)
      .map(block => {
        if (/^Frente:/i.test(block)) {
          const [front, back] = block.split(/\|Verso:/i);
          return `<div class="ai-flashcard">
            <span class="ai-fc-front">❓ ${(front.replace(/^Frente:/i,'').trim())}</span>
            <span class="ai-fc-back">✓ ${(back||'').trim()}</span>
          </div>`;
        }
        return `<p>${block.replace(/\n/g,'<br>')}</p>`;
      }).join('');

    resp.innerHTML = `<div class="ai-reply">${formatted}</div>`;

    // Clear input after sending question
    const inp = document.getElementById(`ai-input-${flatIdx}`);
    if (inp && action === 'duvida') inp.value = '';
  } catch {
    resp.innerHTML = `<div class="ai-error">⚠️ Erro de conexão. Verifique sua internet e tente novamente.</div>`;
  }
}

// ── Navigation ────────────────────────────────────────────────────────────────
function completeAndNext() {
  completed.add(currentFlat);
  localStorage.setItem(`pvx_progress_${courseKey}`, JSON.stringify([...completed]));

  const item = document.getElementById(`lesson-item-${currentFlat}`);
  if (item) {
    item.classList.add('done');
    item.classList.remove('active');
    const chk = item.querySelector('.px-sb-les-check');
    if (chk) { chk.classList.add('checked'); chk.textContent = '✓'; }
  }
  updateProgress();

  if (currentFlat < flatLessons.length - 1) {
    goToLesson(currentFlat + 1);
  } else {
    stopSpeech();
    const content = document.getElementById('px-content');
    const finDiv = document.createElement('div');
    finDiv.style.cssText = 'max-width:780px;margin:20px auto;background:linear-gradient(135deg,#F5520C,#FF7040);color:#fff;border-radius:14px;padding:40px;text-align:center;';
    finDiv.innerHTML = `<div style="font-size:2.5rem;margin-bottom:14px;">🎉</div>
      <div style="font-size:1.25rem;font-weight:800;margin-bottom:8px;">Curso concluído!</div>
      <div style="font-size:.9rem;opacity:.88;margin-bottom:24px;">Parabéns! Você completou todas as aulas deste curso.</div>
      <a href="cursos-app.html" style="background:#fff;color:#F5520C;padding:10px 28px;border-radius:8px;font-weight:700;text-decoration:none;font-size:.9rem;">← Voltar aos cursos</a>`;
    content.appendChild(finDiv);
  }
}

function navigate(dir) { goToLesson(currentFlat + dir); }

function updateProgress() {
  const total = flatLessons.length;
  const done  = completed.size;
  const pct   = total ? Math.round((done / total) * 100) : 0;
  document.getElementById('sb-prog-fill').style.width = pct + '%';
  document.getElementById('sb-prog-text').textContent = `${done}/${total} (${pct}%)`;
}

// ── Sidebar toggle ────────────────────────────────────────────────────────────
function toggleSidebar() {
  document.getElementById('px-sidebar').classList.toggle('collapsed');
}

// ── Timer ─────────────────────────────────────────────────────────────────────
function toggleTimer() {
  if (timerRunning) {
    clearInterval(timerInterval);
    timerRunning = false;
    document.getElementById('timer-play').classList.remove('playing');
    document.getElementById('timer-play').textContent = '▶';
  } else {
    timerRunning = true;
    document.getElementById('timer-play').classList.add('playing');
    document.getElementById('timer-play').textContent = '⏸';
    timerInterval = setInterval(() => {
      if (timerSeconds > 0) { timerSeconds--; updateTimerDisplay(); }
      else { clearInterval(timerInterval); timerRunning = false; document.getElementById('timer-play').textContent = '▶'; }
    }, 1000);
  }
}

function resetTimer() {
  clearInterval(timerInterval);
  timerRunning = false;
  timerSeconds = 3600;
  document.getElementById('timer-play').classList.remove('playing');
  document.getElementById('timer-play').textContent = '▶';
  updateTimerDisplay();
}

function updateTimerDisplay() {
  const h = Math.floor(timerSeconds / 3600);
  const m = Math.floor((timerSeconds % 3600) / 60);
  const s = timerSeconds % 60;
  document.getElementById('timer-display').textContent =
    `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

// ── Lesson progress tracking (per-session, in-memory) ─────────────────────────
const lessonProg = {};

function getLessonProg(idx) {
  if (!lessonProg[idx]) {
    lessonProg[idx] = {
      readPct:       0,
      quizDone:      completed.has(idx),
      socraticDone:  false,
      audioDone:     false,
    };
  }
  return lessonProg[idx];
}

function estimateReadTime(lesson) {
  const stripped = (lesson.content || '').replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim();
  const words = stripped.split(' ').filter(Boolean).length
              + (lesson.summary || '').split(' ').filter(Boolean).length;
  const mins = Math.max(3, Math.round(words / 200));
  return `~${mins} min`;
}

function renderHero(lesson, flatIdx) {
  const prog       = getLessonProg(flatIdx);
  const { moduleIdx } = flatLessons[flatIdx];
  const mod        = COURSES[courseKey].modules[moduleIdx];
  const lesNum     = lesson.title.match(/^(\d+\.\d+)/)?.[1] || '';
  const shortTitle = lesson.title.replace(/^\d+\.\d+\s+/, '');

  const segs = [
    { id:'hps-read', icon:'📖', label:'Leitura',   pct: prog.readPct,             done: prog.readPct >= 80 },
    { id:'hps-quiz', icon:'📝', label:'Questão',   pct: prog.quizDone  ? 100 : 0, done: prog.quizDone },
    { id:'hps-soc',  icon:'🧠', label:'Socrática', pct: prog.socraticDone?100 : 0, done: prog.socraticDone },
    { id:'hps-aud',  icon:'🎧', label:'Áudio',     pct: prog.audioDone ? 100 : 0, done: prog.audioDone },
  ];

  const segsHtml = segs.map(s => `
    <div class="px-hps${s.done?' done':s.pct>0?' active':''}" id="${s.id}">
      <div class="px-hps-track"><div class="px-hps-fill" style="width:${s.pct}%"></div></div>
      <div class="px-hps-lbl"><span>${s.done?'✓':s.icon}</span>${s.label}</div>
    </div>`).join('');

  return `<div class="px-hero">
    <div class="px-hero-top">
      <span class="px-hero-mod">Módulo ${moduleIdx + 1} · ${mod.name}</span>
      <div class="px-hero-chips">
        <span class="px-hero-chip">⏱ ${estimateReadTime(lesson)}</span>
        ${lesNum ? `<span class="px-hero-chip">Aula ${lesNum}</span>` : ''}
      </div>
    </div>
    <div class="px-hero-title">${shortTitle}</div>
    <div class="px-hero-rule"></div>
    <div class="px-hero-segs-label">Progresso desta aula</div>
    <div class="px-hero-segs">${segsHtml}</div>
  </div>`;
}

function updateHeroProgress() {
  if (currentView !== 'content') return;
  const prog = getLessonProg(currentFlat);
  const segs = [
    { id:'hps-read', icon:'📖', pct: prog.readPct,             done: prog.readPct >= 80 },
    { id:'hps-quiz', icon:'📝', pct: prog.quizDone  ? 100 : 0, done: prog.quizDone },
    { id:'hps-soc',  icon:'🧠', pct: prog.socraticDone?100 : 0, done: prog.socraticDone },
    { id:'hps-aud',  icon:'🎧', pct: prog.audioDone ? 100 : 0, done: prog.audioDone },
  ];
  segs.forEach(s => {
    const el = document.getElementById(s.id);
    if (!el) return;
    el.querySelector('.px-hps-fill').style.width = s.pct + '%';
    el.className = 'px-hps' + (s.done ? ' done' : s.pct > 0 ? ' active' : '');
    const icon = el.querySelector('.px-hps-lbl span');
    if (icon) icon.textContent = s.done ? '✓' : s.icon;
  });
}

// ── Font size ─────────────────────────────────────────────────────────────────
function setFontSize(size) {
  document.getElementById('px-content').style.setProperty('--lesson-fs', size + 'px');
}

// ── Theme ─────────────────────────────────────────────────────────────────────
function setTheme(theme) {
  const c = document.getElementById('px-content');
  c.classList.remove('theme-sepia', 'theme-dark');
  if (theme !== 'light') c.classList.add(`theme-${theme}`);
  document.querySelectorAll('.px-tb-theme-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`t-${theme}`).classList.add('active');
}

init();
</script>
